<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="StudyBot v3 — 문서 기반 AI 학습 챗봇. 6개 도메인, 마인드맵, 음성, 퀴즈.">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:; img-src 'self' data: https:; font-src https://fonts.gstatic.com;">
<title>StudyBot v3</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ RESET ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
button,input,textarea{font:inherit;color:inherit;border:none;background:none}
a{color:inherit;text-decoration:none}
ul,ol{list-style:none}

/* ═══ DESIGN TOKENS ═══ */
:root{
  --bg-0:#09090b;--bg-1:#0f0f12;--bg-2:#18181b;--bg-3:#27272a;
  --text-1:#fafafa;--text-2:#a1a1aa;--text-3:#71717a;--text-4:#52525b;
  --border:#27272a;--border-hover:#3f3f46;
  --accent:#3b82f6;--accent-hover:#2563eb;--accent-soft:rgba(59,130,246,.12);
  --purple:#8b5cf6;--green:#22c55e;--orange:#f59e0b;--red:#ef4444;--cyan:#06b6d4;
  --font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  --text-xs:.694rem;--text-sm:.833rem;--text-base:1rem;--text-lg:1.2rem;--text-xl:1.44rem;--text-2xl:1.728rem;
  --leading-tight:1.25;--leading-normal:1.5;--leading-relaxed:1.75;
  --weight-normal:400;--weight-medium:500;--weight-semibold:600;--weight-bold:700;
  --space-0:0;--space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-8:32px;--space-10:40px;
  --radius-sm:4px;--radius:8px;--radius-lg:12px;--radius-xl:16px;--radius-full:9999px;
  --ease-out:cubic-bezier(.16,1,.3,1);--ease-spring:cubic-bezier(.34,1.56,.64,1);
  --dur-fast:150ms;--dur-normal:250ms;--dur-slow:400ms;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);--shadow:0 4px 12px rgba(0,0,0,.4);--shadow-lg:0 12px 40px rgba(0,0,0,.5);
}

/* ═══ THEMES ═══ */
[data-theme="light"]{
  --bg-0:#ffffff;--bg-1:#f4f4f5;--bg-2:#e4e4e7;--bg-3:#d4d4d8;
  --text-1:#09090b;--text-2:#52525b;--text-3:#a1a1aa;--text-4:#d4d4d8;
  --border:#e4e4e7;--border-hover:#d4d4d8;
  --shadow-sm:0 1px 2px rgba(0,0,0,.06);--shadow:0 4px 12px rgba(0,0,0,.08);--shadow-lg:0 12px 40px rgba(0,0,0,.12);
}
[data-theme="highcontrast"]{
  --bg-0:#000000;--bg-1:#0a0a0a;--bg-2:#171717;--bg-3:#262626;
  --text-1:#ffffff;--text-2:#e5e5e5;--text-3:#a3a3a3;--text-4:#737373;
  --border:#ffffff;--border-hover:#ffffff;--accent:#60a5fa;--accent-hover:#93bbfd;
}

/* ═══ KEYFRAMES ═══ */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes msgIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes msgUser{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
@keyframes pop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes ambient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes draw{to{stroke-dashoffset:0}}
@keyframes slideRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ═══ BASE ═══ */
body{font-family:var(--font-family);font-size:var(--text-base);line-height:var(--leading-normal);color:var(--text-2);background:var(--bg-0);overflow:hidden;height:100vh}

/* ═══ LAYOUT ═══ */
.app{display:flex;height:100vh;overflow:hidden}
.panel-left{width:260px;min-width:260px;background:var(--bg-1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform var(--dur-normal) var(--ease-out)}
.panel-center{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-0)}
.panel-right{width:320px;min-width:320px;background:var(--bg-1);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:relative;transition:transform var(--dur-normal) var(--ease-out)}

/* ═══ LEFT PANEL ═══ */
.left-header{padding:var(--space-5);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:var(--space-3)}
.left-header .logo{font-size:var(--text-lg);font-weight:var(--weight-bold);color:var(--text-1);display:flex;align-items:center;gap:var(--space-2)}
.left-header .logo span{color:var(--accent)}
.domain-chips{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-2);padding:var(--space-3)}
.chip{height:28px;padding:0 var(--space-3);border-radius:var(--radius-full);border:1px solid var(--border);font-size:var(--text-sm);display:flex;align-items:center;justify-content:center;gap:var(--space-1);cursor:pointer;transition:all var(--dur-fast);color:var(--text-3);white-space:nowrap;overflow:hidden}
.chip:hover{background:var(--bg-3);border-color:var(--border-hover);color:var(--text-1)}
.chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.convo-section{flex:1;overflow-y:auto;padding:var(--space-2)}
.convo-section::-webkit-scrollbar{width:4px}
.convo-section::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:2px}
.convo-group-label{font-size:var(--text-xs);font-weight:var(--weight-semibold);color:var(--text-4);text-transform:uppercase;letter-spacing:.05em;padding:var(--space-2) var(--space-3)}
.convo-item{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border-radius:var(--radius);cursor:pointer;transition:background var(--dur-fast);font-size:var(--text-sm);color:var(--text-2);position:relative}
.convo-item:hover{background:var(--bg-3)}
.convo-item.active{background:var(--accent-soft);color:var(--accent)}
.convo-item .pin{font-size:var(--text-xs);position:absolute;right:var(--space-2);top:50%;transform:translateY(-50%)}
.convo-item .del{display:none;position:absolute;right:var(--space-2);top:50%;transform:translateY(-50%);font-size:var(--text-xs);color:var(--text-4);cursor:pointer;padding:2px 4px;border-radius:var(--radius-sm)}
.convo-item:hover .del{display:block}
.convo-item:hover .pin{display:none}
.streak-footer{padding:var(--space-3) var(--space-5);border-top:1px solid var(--border);font-size:var(--text-sm);color:var(--text-3);display:flex;align-items:center;gap:var(--space-2)}

/* ═══ CENTER PANEL ═══ */
.topbar{padding:var(--space-3) var(--space-5);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:var(--space-3);min-height:52px}
.topbar-title{font-size:var(--text-base);font-weight:var(--weight-semibold);color:var(--text-1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-badge{font-size:var(--text-xs);padding:2px 8px;border-radius:var(--radius-full);background:var(--accent-soft);color:var(--accent);font-weight:var(--weight-medium)}
.topbar-actions{display:flex;gap:var(--space-1)}
.confidence-bar{height:3px;background:var(--bg-2);position:relative;overflow:hidden}
.confidence-bar .fill{height:100%;background:var(--accent);transition:width var(--dur-normal) var(--ease-out);border-radius:0 2px 2px 0}

.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:var(--space-10);text-align:center;animation:fadeIn var(--dur-slow) var(--ease-out)}
.welcome h2{font-size:var(--text-2xl);font-weight:var(--weight-bold);color:var(--text-1);margin-bottom:var(--space-2)}
.welcome p{color:var(--text-3);margin-bottom:var(--space-6);max-width:400px}
.welcome-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-3);max-width:480px;width:100%}
.welcome-card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-4);cursor:pointer;transition:all var(--dur-fast);text-align:left}
.welcome-card:hover{border-color:var(--border-hover);background:var(--bg-3);transform:translateY(-2px)}
.welcome-card .icon{font-size:var(--text-xl);margin-bottom:var(--space-2)}
.welcome-card h4{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-1);margin-bottom:var(--space-1)}
.welcome-card p{font-size:var(--text-xs);color:var(--text-3);margin:0}

.messages{flex:1;overflow-y:auto;padding:var(--space-4) var(--space-5);position:relative;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:6px}
.messages::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:3px}
.msg{padding:var(--space-4) 0;border-bottom:1px solid var(--border);transition:background var(--dur-fast);animation:msgIn var(--dur-slow) var(--ease-out)}
.msg:hover{background:var(--bg-2);margin:0 calc(var(--space-5) * -1);padding-left:var(--space-5);padding-right:var(--space-5)}
.msg:last-child{border-bottom:none}
.msg.user{animation:msgUser var(--dur-normal) var(--ease-out)}
.msg-header{display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-2)}
.msg-avatar{width:24px;height:24px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:var(--text-sm);flex-shrink:0}
.msg.user .msg-avatar{background:var(--accent-soft);color:var(--accent)}
.msg.bot .msg-avatar{background:rgba(139,92,246,.12);color:var(--purple)}
.msg-name{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-1)}
.msg-time{font-size:var(--text-xs);color:var(--text-4)}
.msg-body{font-size:var(--text-base);line-height:var(--leading-relaxed);color:var(--text-2)}
.msg-body h3{font-size:var(--text-lg);font-weight:var(--weight-semibold);color:var(--text-1);margin:var(--space-4) 0 var(--space-2)}
.msg-body h4{font-size:var(--text-base);font-weight:var(--weight-semibold);color:var(--text-1);margin:var(--space-3) 0 var(--space-1)}
.msg-body ul,.msg-body ol{padding-left:var(--space-5);margin:var(--space-2) 0}
.msg-body li{margin:var(--space-1) 0}
.msg-body strong{color:var(--text-1);font-weight:var(--weight-semibold)}
.msg-body code{background:var(--bg-3);padding:1px 6px;border-radius:var(--radius-sm);font-size:.9em}
.msg-body a{color:var(--cyan);border-bottom:1px solid transparent}
.msg-body a:hover{border-color:var(--cyan)}
.msg-actions{display:flex;gap:var(--space-1);margin-top:var(--space-3);flex-wrap:wrap}
.msg-conf{font-size:var(--text-xs);color:var(--text-4);margin-top:var(--space-2);display:flex;align-items:center;gap:var(--space-2)}
.msg-conf .bar{width:60px;height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden}
.msg-conf .bar span{display:block;height:100%;border-radius:2px}
.msg-reading{font-size:var(--text-xs);color:var(--text-4);margin-top:var(--space-1)}
.msg-edit-btn{font-size:var(--text-xs);color:var(--text-4);cursor:pointer;margin-left:auto}
.msg-edit-btn:hover{color:var(--accent)}

/* Source citations */
.sources{margin-top:var(--space-3)}
.sources summary{font-size:var(--text-sm);color:var(--cyan);cursor:pointer;font-weight:var(--weight-medium);display:flex;align-items:center;gap:var(--space-1)}
.sources summary::-webkit-details-marker{display:none}
.sources summary::before{content:'▸';transition:transform var(--dur-fast)}
.sources[open] summary::before{transform:rotate(90deg)}
.source-list{padding:var(--space-2) 0 0 var(--space-4);font-size:var(--text-sm);color:var(--text-3)}
.source-list li{margin:var(--space-1) 0}
.source-list a{color:var(--cyan)}

/* Skeleton */
.skeleton{border-radius:var(--radius);background:linear-gradient(90deg,var(--bg-2) 25%,var(--bg-3) 50%,var(--bg-2) 75%);background-size:600px 100%;animation:shimmer 1.5s infinite}
.skeleton-line{height:14px;margin:var(--space-2) 0;border-radius:var(--radius-sm)}
.skeleton-line:nth-child(2){width:85%}.skeleton-line:nth-child(3){width:60%}

/* Typing indicator */
.typing{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-3) 0;color:var(--text-3);font-size:var(--text-sm)}
.typing-dots{display:flex;gap:3px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text-4);animation:pop .6s ease infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}

/* Scroll & Summary buttons */
.scroll-btn,.summary-btn{position:absolute;right:var(--space-5);background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-full);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--dur-fast);color:var(--text-3);font-size:var(--text-sm);z-index:5;box-shadow:var(--shadow)}
.scroll-btn{bottom:var(--space-4)}.scroll-btn:hover,.summary-btn:hover{background:var(--bg-3);color:var(--text-1)}
.summary-btn{bottom:calc(var(--space-4) + 44px);display:none}

/* Suggest bar */
.suggest-bar{padding:var(--space-2) var(--space-5);display:flex;gap:var(--space-2);overflow-x:auto;flex-wrap:nowrap}
.suggest-bar::-webkit-scrollbar{height:0}
.suggest-chip{height:28px;padding:0 var(--space-3);border-radius:var(--radius-full);border:1px solid var(--border);font-size:var(--text-sm);cursor:pointer;transition:all var(--dur-fast);color:var(--text-3);white-space:nowrap;display:flex;align-items:center;gap:var(--space-1);flex-shrink:0}
.suggest-chip:hover{background:var(--bg-3);border-color:var(--border-hover);color:var(--text-1)}

/* Input area */
.input-area{padding:var(--space-3) var(--space-5) var(--space-5);border-top:1px solid var(--border)}
.input-row{display:flex;gap:var(--space-2);align-items:flex-end}
.input-wrap{flex:1;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:flex-end;transition:border-color var(--dur-fast)}
.input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
#userInput{flex:1;padding:var(--space-2) var(--space-3);background:none;border:none;outline:none;resize:none;min-height:40px;max-height:120px;color:var(--text-1);font-size:var(--text-base);line-height:var(--leading-normal)}
#userInput::placeholder{color:var(--text-4)}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2);border-radius:var(--radius);font-size:var(--text-sm);font-weight:var(--weight-medium);cursor:pointer;transition:all var(--dur-fast);white-space:nowrap}
.btn-primary{height:36px;padding:0 var(--space-4);background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);box-shadow:0 0 20px var(--accent-soft)}
.btn-secondary{height:36px;padding:0 var(--space-4);border:1px solid var(--border);color:var(--text-2)}
.btn-secondary:hover{background:var(--bg-3);border-color:var(--border-hover)}
.btn-ghost{padding:var(--space-1) var(--space-2);color:var(--text-3)}
.btn-ghost:hover{background:var(--bg-3);color:var(--text-1)}
.btn-icon{width:32px;height:32px;border-radius:var(--radius);color:var(--text-3)}
.btn-icon:hover{background:var(--bg-3);color:var(--text-1)}

/* ═══ RIGHT PANEL ═══ */
.resize-handle{position:absolute;left:0;top:0;bottom:0;width:4px;cursor:col-resize;background:transparent;z-index:10}
.resize-handle:hover{background:var(--accent)}
.right-header{padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border);font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-1);display:flex;align-items:center;justify-content:space-between}
.mm-container{flex:1;overflow:hidden;position:relative;min-height:200px}
.mm-container svg{width:100%;height:100%}
.mm-zoom{position:absolute;bottom:var(--space-3);right:var(--space-3);display:flex;gap:var(--space-1)}
.mm-node{cursor:pointer;transition:filter var(--dur-fast)}.mm-node:hover{filter:brightness(1.2)}
.mm-node text{font-family:var(--font-family);fill:var(--text-1);font-size:11px}
.mm-node.root rect{rx:12}
.mm-node.child rect{rx:8}
.mm-node.leaf rect{rx:6}
.mm-line{stroke:var(--border);stroke-width:1.5;fill:none;stroke-dasharray:200;stroke-dashoffset:200;animation:draw .8s var(--ease-out) forwards}
.mm-tooltip{position:absolute;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:var(--space-2) var(--space-3);font-size:var(--text-xs);color:var(--text-2);pointer-events:none;opacity:0;transition:opacity var(--dur-fast);z-index:20;max-width:200px}

.right-section{padding:var(--space-3) var(--space-5);border-top:1px solid var(--border)}
.right-section h4{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--text-1);margin-bottom:var(--space-2)}
.text-analysis{width:100%;padding:var(--space-2) var(--space-3);background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-1);font-size:var(--text-sm);resize:vertical;min-height:60px}
.text-analysis:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px var(--accent-soft)}
.bookmark-list{max-height:160px;overflow-y:auto}
.bookmark-item{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-1) 0;font-size:var(--text-sm);color:var(--text-2);cursor:pointer;transition:color var(--dur-fast)}
.bookmark-item:hover{color:var(--accent)}
.quick-notes{width:100%;padding:var(--space-2) var(--space-3);background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-1);font-size:var(--text-sm);resize:vertical;min-height:80px}
.quick-notes:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px var(--accent-soft)}

/* ═══ OVERLAYS ═══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding-top:20vh}
.overlay.open{display:flex}
.overlay-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);max-width:480px;width:100%;padding:var(--space-6);animation:slideUp .2s var(--ease-out)}
.search-input{width:100%;padding:var(--space-3);background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);font-size:var(--text-base);color:var(--text-1);outline:none}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search-results{margin-top:var(--space-3);max-height:300px;overflow-y:auto}
.search-result{padding:var(--space-2) var(--space-3);border-radius:var(--radius);cursor:pointer;font-size:var(--text-sm);color:var(--text-2);transition:background var(--dur-fast)}
.search-result:hover{background:var(--bg-3)}

/* Toasts */
.toast-container{position:fixed;bottom:var(--space-5);right:var(--space-5);z-index:200;display:flex;flex-direction:column;gap:var(--space-2)}
.toast{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);padding:var(--space-3) var(--space-4);font-size:var(--text-sm);color:var(--text-2);backdrop-filter:blur(12px);box-shadow:var(--shadow);animation:slideRight var(--dur-normal) var(--ease-out);border-left:3px solid var(--accent);max-width:320px}
.toast.success{border-left-color:var(--green)}.toast.error{border-left-color:var(--red)}.toast.warn{border-left-color:var(--orange)}
.toast.out{animation:slideRight var(--dur-normal) var(--ease-out) reverse forwards}

/* Achievement badge */
.badge-achieve{display:inline-flex;align-items:center;gap:var(--space-1);padding:2px 8px;border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:var(--weight-semibold);animation:pop var(--dur-slow) var(--ease-spring)}
.badge-achieve.gold{background:rgba(245,158,11,.15);color:var(--orange);border:1px solid rgba(245,158,11,.3)}
.badge-achieve.blue{background:var(--accent-soft);color:var(--accent);border:1px solid rgba(59,130,246,.3)}

/* Emoji picker */
.emoji-pick{display:none;position:absolute;bottom:100%;right:0;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-2);box-shadow:var(--shadow-lg);z-index:30}
.emoji-pick.open{display:flex;gap:var(--space-1)}
.emoji-pick span{font-size:var(--text-lg);cursor:pointer;padding:var(--space-1);border-radius:var(--radius-sm);transition:background var(--dur-fast)}
.emoji-pick span:hover{background:var(--bg-3)}

/* Mobile toggle */
.mobile-toggle{display:none;position:fixed;z-index:50}
.toggle-left{top:var(--space-3);left:var(--space-3)}
.toggle-right{top:var(--space-3);right:var(--space-3)}

/* ═══ RESPONSIVE ═══ */
@media(max-width:1024px){
  .panel-right{position:fixed;right:0;top:0;bottom:0;transform:translateX(100%);z-index:60;box-shadow:var(--shadow-lg)}
  .panel-right.open{transform:translateX(0)}
  .toggle-right{display:flex}
}
@media(max-width:768px){
  .panel-left{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:60;box-shadow:var(--shadow-lg)}
  .panel-left.open{transform:translateX(0)}
  .toggle-left{display:flex}
  .welcome-grid{grid-template-columns:1fr}
  .topbar{padding:var(--space-3) var(--space-3) var(--space-3) 48px}
  .messages{padding:var(--space-3)}
  .input-area{padding:var(--space-3)}
  .suggest-bar{padding:var(--space-2) var(--space-3)}
}

/* ═══ PRINT ═══ */
.app.focus-mode .panel-left,.app.focus-mode .panel-right{display:none!important}
.app.focus-mode .panel-center{max-width:100%}
.app.focus-mode .msg-list-inner{max-width:860px}
.cmd-popup{position:absolute;bottom:100%;left:0;right:0;background:var(--bg-1);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);margin-bottom:8px;overflow:hidden;display:none;z-index:10}
.cmd-popup.show{display:block}
.cmd-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background var(--dur-fast);font-size:var(--text-sm)}
.cmd-item:hover{background:var(--bg-3)}
@media print{
  .panel-left,.panel-right,.topbar,.input-area,.suggest-bar,.msg-actions,.scroll-btn,.summary-btn,.mobile-toggle,.toast-container{display:none!important}
  .app{display:block}.panel-center{display:block}
  .messages{overflow:visible;height:auto}
  .msg{break-inside:avoid;border-bottom:1px solid #ccc;padding:8px 0}
  body{background:#fff;color:#000}.msg-body{color:#222}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
.app{animation:fadeIn .5s var(--ease-out) backwards}
.panel-resize{position:absolute;left:-3px;top:0;bottom:0;width:6px;cursor:col-resize;z-index:6}
.panel-resize:hover,.panel-resize.active{background:var(--accent);opacity:.4;border-radius:3px}
</style>
</head>
<body>

<div class="app">
  <!-- LEFT PANEL -->
  <aside class="panel-left" id="panelLeft">
    <div class="left-header">
      <div class="logo">🤖 <span>Study</span>Bot</div>
    </div>
    <div class="domain-chips" id="domainBar"></div>
    <div class="convo-section" id="convoList"></div>
    <div class="streak-footer" id="streakFooter">🔥 0일 연속 학습</div>
  </aside>

  <!-- CENTER PANEL -->
  <main class="panel-center">
    <div class="topbar">
      <span class="topbar-title" id="topTitle">StudyBot v3</span>
      <span class="topbar-badge" id="topBadge">생물학</span>
      <div class="topbar-actions">
        <button class="btn-icon" onclick="toggleTheme()" title="테마 전환">🎨</button>
        <button class="btn-icon" onclick="openSearch()" title="검색 (Ctrl+K)">🔍</button>
        <button class="btn-icon" onclick="newConvo()" title="새 대화">✚</button>
      </div>
    </div>
    <div class="confidence-bar"><div class="fill" id="confFill" style="width:0%"></div></div>

    <div id="welcomeScreen" class="welcome"></div>

      <button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()" title="아래로" style="display:none">↓</button>
      <button class="summary-btn" id="summaryBtn" onclick="generateSummary()" title="요약" style="display:none">Σ</button>
    </div>

    <div class="suggest-bar" id="suggestBar"></div>
    <div class="input-area">
      <div class="input-row">
        <div class="input-wrap" style="position:relative;flex:1">
          <div class="cmd-popup"></div>

        <button class="btn btn-primary" onclick="send()" title="전송" id="sendBtn">전송</button>

    </div>
  </main>

  <!-- RIGHT PANEL -->
  <aside class="panel-right" id="panelRight">
    <div class="resize-handle" id="resizeHandle"></div>

      <span>🧠 마인드맵</span>
      <button class="btn-icon" onclick="toggleRight()" title="닫기">✕</button>
    </div>
    <div class="mm-container" id="mmContainer">

      <div class="mm-tooltip" id="mmTooltip"></div>
      <div class="mm-zoom">
        <button class="btn-icon" onclick="mmZoom(1.2)" title="확대">＋</button>
        <button class="btn-icon" onclick="mmZoom(0.8)" title="축소">－</button>

<!-- Mobile toggles -->
<button class="btn-icon mobile-toggle toggle-left" onclick="toggleLeft()">☰</button>

<!-- Toast container -->
<div class="toast-container" id="toastBox"></div>

<script>
(function(){
'use strict';

/* ═══════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════ */
function $(id){return document.getElementById(id)}
function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function sanitizeHtml(h){
  return h.replace(/<script[\s\S]*?<\/script>/gi,'')
    .replace(/on\w+\s*=/gi,'')
    .replace(/<(?!\/?(a|b|strong|em|i|ul|ol|li|h3|h4|p|br|code|details|summary|span|div)\b)[^>]*>/gi,'')
    .replace(/href\s*=\s*["'](?!https?:\/\/)[^"']*["']/gi,'href="#"');
}
function showToast(msg,type){
  var box=$('toastBox');if(!box)return;
  var t=document.createElement('div');t.className='toast'+(type?' '+type:'');
  t.textContent=msg;box.appendChild(t);
  setTimeout(function(){t.classList.add('out');setTimeout(function(){if(t.parentNode)t.remove()},300)},3000);
}
function copyText(t){
  navigator.clipboard.writeText(t).then(function(){showToast('클립보드에 복사됨','success')})
    .catch(function(){showToast('복사 실패','error')});
}
function scrollToBottom(){
  var m=$('msgArea');if(m)m.scrollTop=m.scrollHeight;
}
function timeAgo(ts){
  var d=new Date(ts),now=new Date(),diff=now-d,s=Math.floor(diff/1000);
  if(s<60)return '방금 전';if(s<3600)return Math.floor(s/60)+'분 전';
  if(s<86400)return Math.floor(s/3600)+'시간 전';return Math.floor(s/86400)+'일 전';
}
function readTime(text){
  var words=text.replace(/<[^>]*>/g,'').split(/\s+/).length;
  return Math.max(1,Math.round(words/200));
}

/* ═══════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════ */
var STORE='studybot_v3';
var convos=[], activeId=null, curDomain='bio', theme='dark', busy=false;
var bookmarks=[], mmScale=1, streamAbort=false;

function loadStore(){
  try{
    var d=JSON.parse(localStorage.getItem(STORE));
    if(d){convos=d.convos||[];activeId=d.activeId||null;curDomain=d.curDomain||'bio';theme=d.theme||'dark';bookmarks=d.bookmarks||[];}
  }catch(e){}
  document.documentElement.setAttribute('data-theme',theme);
  var n=$('quickNotes');if(n)n.value=localStorage.getItem(STORE+'_notes')||'';
}
function saveStore(){
  localStorage.setItem(STORE,JSON.stringify({convos:convos,activeId:activeId,curDomain:curDomain,theme:theme,bookmarks:bookmarks}));
}
function getActive(){
  if(!activeId)return null;
  for(var i=0;i<convos.length;i++){if(convos[i].id===activeId)return convos[i];}
  return null;
}
function newConvo(){
  var c={id:Date.now().toString(),title:'새 대화',domain:curDomain,msgs:[],pinned:false,created:Date.now(),words:0};
  convos.unshift(c);activeId=c.id;saveStore();
  renderAll();showToast('새 대화가 시작됨','success');
}
function switchConvo(id){
  if(id===activeId)return;
  streamAbort=true;activeId=id;
  var c=getActive();if(c)curDomain=c.domain;
  saveStore();renderAll();
}
function deleteConvo(id){
  convos=convos.filter(function(c){return c.id!==id});
  if(activeId===id){activeId=convos.length?convos[0].id:null;}
  saveStore();renderAll();showToast('대화 삭제됨');
}
function pushMsg(role,text,sources,conf){
  var c=getActive();if(!c)return;
  var plain=text.replace(/<[^>]*>/g,'');
  c.msgs.push({role:role,text:text,sources:sources||null,conf:conf||null,time:Date.now()});
  c.words=(c.words||0)+plain.split(/\s+/).length;
  if(c.msgs.length===1)c.title=plain.substring(0,30)+(plain.length>30?'…':'');
  saveStore();updateSummaryBtn();
}

function renderDomainBar(){
  var el=$('domainBar');if(!el)return;var h='';
  var keys=Object.keys(domainMeta);
  for(var i=0;i<keys.length;i++){
    var k=keys[i],d=domainMeta[k];
    h+='<button class="chip'+(k===curDomain?' active':'')+'" data-domain="'+k+'">'+d.icon+' '+d.name+'</button>';
  }
  el.innerHTML=h;
  el.onclick=function(e){
    var btn=e.target.closest('[data-domain]');if(!btn)return;
    curDomain=btn.getAttribute('data-domain');saveStore();renderAll();
  };
}

function renderConvos(){
  var el=$('convoList');if(!el)return;
  var sorted=convos.slice().sort(function(a,b){return(b.pinned?1:0)-(a.pinned?1:0)||b.created-a.created});
  var groups={today:[],yesterday:[],week:[],older:[]};
  var now=Date.now(),day=864e5;
  for(var i=0;i<sorted.length;i++){
    var c=sorted[i],age=now-c.created;
    if(c.pinned||age<day)groups.today.push(c);
    else if(age<2*day)groups.yesterday.push(c);
    else if(age<7*day)groups.week.push(c);
    else groups.older.push(c);
  }
  var h='';
  var labels={today:'오늘',yesterday:'어제',week:'이번 주',older:'이전'};
  var gkeys=['today','yesterday','week','older'];
  for(var g=0;g<gkeys.length;g++){
    var items=groups[gkeys[g]];if(!items.length)continue;
    h+='<div class="convo-group-label">'+labels[gkeys[g]]+'</div>';
    for(var j=0;j<items.length;j++){
      var c=items[j];
      h+='<div class="convo-item'+(c.id===activeId?' active':'')+'" data-id="'+c.id+'">';
      h+=domainMeta[c.domain]?domainMeta[c.domain].icon:'💬';
      h+=' <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escHtml(c.title)+'</span>';
      if(c.pinned)h+='<span class="pin">📌</span>';

function renderMindmap(){
  var svg=$('mmSvg');if(!svg)return;
  var data=mmData[curDomain];if(!data)return;
  mmScale=1;
  var ns='http://www.w3.org/2000/svg';
  var w=320,h=300,cx=w/2,cy=30;
  var svgH='<defs>';
  svgH+='<linearGradient id="gRoot" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="'+domainMeta[curDomain].color+'"/><stop offset="100%" stop-color="var(--purple)"/></linearGradient>';
  svgH+='<linearGradient id="gChild" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="var(--bg-3)"/><stop offset="100%" stop-color="var(--bg-2)"/></linearGradient>';
  svgH+='</defs>';
  var nodes=[],lines=[];
  var rootW=80,rootH=28;
  nodes.push({x:cx,y:cy+14,w:rootW,h:rootH,label:data.label,cls:'root',fill:'url(#gRoot)'});
  var childCount=data.children.length;
  var childSpacing=w/(childCount+1);
  var childY=cy+80;
  for(var i=0;i<childCount;i++){
    var child=data.children[i];
    var childX=childSpacing*(i+1);
    var cW=70,cH=24;
    nodes.push({x:childX,y:childY,w:cW,h:cH,label:child.label,cls:'child',fill:'url(#gChild)'});
    lines.push({x1:cx,y1:cy+14+rootH/2,x2:childX,y2:childY-cH/2});
    if(child.children){
      var leafCount=child.children.length;
      var leafSpread=Math.min(60,120/leafCount);
      var leafStartX=childX-((leafCount-1)*leafSpread)/2;
      for(var j=0;j<leafCount;j++){
        var leaf=child.children[j];
        var lx=leafStartX+j*leafSpread;
        var ly=childY+65;
        nodes.push({x:lx,y:ly,w:64,h:22,label:leaf.label,cls:'leaf',fill:'var(--bg-2)'});
        lines.push({x1:childX,y1:childY+cH/2,x2:lx,y2:ly-11});
      }
    }
  }
  for(var l=0;l<lines.length;l++){
    var ln=lines[l];
    svgH+='<line class="mm-line" x1="'+ln.x1+'" y1="'+ln.y1+'" x2="'+ln.x2+'" y2="'+ln.y2+'" style="animation-delay:'+(l*60)+'ms"/>';
  }
  for(var n=0;n<nodes.length;n++){
    var nd=nodes[n];
    svgH+='<g class="mm-node '+nd.cls+'" data-label="'+escHtml(nd.label)+'" style="animation:pop var(--dur-slow) var(--ease-spring) '+(n*80)+'ms both" onmouseenter="mmTip(this,evt)" onmouseleave="mmHide()">';
    svgH+='<rect x="'+(nd.x-nd.w/2)+'" y="'+(nd.y-nd.h/2)+'" width="'+nd.w+'" height="'+nd.h+'" fill="'+nd.fill+'" stroke="var(--border)" stroke-width="1"/>';
    svgH+='<text x="'+nd.x+'" y="'+(nd.y+4)+'" text-anchor="middle" font-size="'+(nd.cls==='root'?'12':'10')+'">'+escHtml(nd.label)+'</text>';
    svgH+='</g>';
  }
  svg.innerHTML=svgH;
  svg.setAttribute('viewBox','0 0 '+w+' '+Math.max(h,childY+130));
}

function stream(el,html,done){
  if(!el)return;
  streamAbort=false;
  var plain=html.replace(/<[^>]*>/g,'');
  var chars=plain.split('');
  var i=0;el.textContent='';
  var timer=setInterval(function(){
    if(streamAbort){clearInterval(timer);return;} // NO done() call on cancel — v2 bug fix
    if(i>=chars.length){clearInterval(timer);el.innerHTML=sanitizeHtml(html);if(done)done();return;}
    el.textContent+=chars[i];i++;
    if(i%20===0)scrollToBottom();
  },12);
}

function resolve(text){
  var t=text.toLowerCase().replace(/\s+/g,' ').trim();

  // Rec keyword
  if(t.indexOf('추천')!==-1||t.indexOf('영상')!==-1||t.indexOf('youtube')!==-1){
    return{type:'rec'};
  }
  // Mind map keyword
  if(t.indexOf('마인드맵')!==-1||t.indexOf('맵')!==-1||t.indexOf('mindmap')!==-1){
    return{type:'mm'};
  }

  var docs=domains[curDomain]?domains[curDomain].docs:[];
  var best=null,bestScore=0;
  for(var i=0;i<docs.length;i++){
    var d=docs[i],score=0;
    for(var k=0;k<d.keywords.length;k++){
      if(t.indexOf(d.keywords[k].toLowerCase())!==-1)score++;
    }
    if(score>=2&&score>bestScore){bestScore=score;best=d;}
  }
  if(best)return{type:'doc',doc:best};
  // Single keyword fallback
  for(var i=0;i<docs.length;i++){
    var d=docs[i];
    for(var k=0;k<d.keywords.length;k++){
      if(t.indexOf(d.keywords[k].toLowerCase())!==-1)return{type:'doc',doc:d};
    }
  }
  return{type:'guard'};
}

function handle(text){
  if(busy)return;
  if(!text.trim())return;
  if(text.startsWith('/')&&doSlash(text))return;
  busy=true;addUser(text);showTyp();

  setTimeout(function(){
    hideTyp();
    var r=resolve(text);
    if(r.type==='rec'){
      var rec=recs[curDomain]||'추천 영상이 없습니다.';
      addBot('<h3>🎬 '+domainMeta[curDomain].name+' 추천 영상</h3><p>'+rec+'</p>',null,null,true,80);
    }else if(r.type==='mm'){
      addBot('<h3>🧠 마인드맵</h3><p>오른쪽 패널에서 <strong>'+domainMeta[curDomain].name+'</strong> 마인드맵을 확인하세요!</p><p>확대/축소, 노드 호버로 상세 정보를 볼 수 있습니다.</p>',null,null,true,85);
      var rp=$('panelRight');if(rp&&window.innerWidth<=1024)rp.classList.add('open');
    }else if(r.type==='doc'){
      var d=r.doc;
      var confBar=$('confFill');if(confBar)confBar.style.width=d.conf+'%';
      addBot(d.a,d.sources,d.chips,true,d.conf);
    }else{
      addBot(guardResponse.replace(domainMeta[curDomain].name,domainMeta[curDomain].name),null,null,true,0);
    }
    busy=false;updateStreak();checkAchievements();
  },800+Math.random()*400);
}

/* ═══════════════════════════════════════════
   INPUT HANDLERS
   ═══════════════════════════════════════════ */
function send(){
  var inp=$('userInput');if(!inp)return;
  var t=inp.value.trim();if(!t||busy)return;
  inp.value='';inp.style.height='auto';
  handle(t);
}
function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
}
// Auto-resize textarea
(function(){
  var inp=$('userInput');if(!inp)return;
  inp.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';
    var v=this.value;var pop=document.querySelector('.cmd-popup');
    if(pop&&v.startsWith('/')){var matches=slashCmds.filter(function(c){return c.c.indexOf(v)===0});if(matches.length){pop.innerHTML=matches.map(function(c){return'<div class="cmd-item" data-cmd="'+c.c+'">'+c.i+' <strong style="color:var(--accent)">'+c.c+'</strong> <span style="color:var(--text-3)">'+c.d+'</span></div>'}).join('');pop.classList.add('show');pop.querySelectorAll('.cmd-item').forEach(function(el){el.addEventListener('click',function(){inp.value='';pop.classList.remove('show');handle(el.dataset.cmd)})})}else pop.classList.remove('show')}else if(pop)pop.classList.remove('show')
  });
})();

/* ═══════════════════════════════════════════
   FEATURES
   ═══════════════════════════════════════════ */
// Welcome card click
window.handleWelcome=function(q){
  if(!getActive())newConvo();
  handle(q);
};

// Theme toggle
window.toggleTheme=function(){
  var themes=['dark','light','highcontrast'];
  var idx=themes.indexOf(theme);
  theme=themes[(idx+1)%themes.length];
  document.documentElement.setAttribute('data-theme',theme);
  saveStore();showToast('테마: '+theme,'success');
};

// Search
window.openSearch=function(){var o=$('searchOverlay');if(o){o.classList.add('open');var si=$('searchInput');if(si)si.focus();}};
window.closeSearch=function(){var o=$('searchOverlay');if(o)o.classList.remove('open');};
window.doSearch=function(q){
  var el=$('searchResults');if(!el)return;
  if(!q.trim()){el.innerHTML='';return;}
  var results=[];q=q.toLowerCase();
  for(var i=0;i<convos.length;i++){
    var c=convos[i];
    for(var j=0;j<c.msgs.length;j++){
      var m=c.msgs[j],plain=(m.text||'').replace(/<[^>]*>/g,'').toLowerCase();
      if(plain.indexOf(q)!==-1){
        results.push({convoId:c.id,title:c.title,preview:plain.substring(0,80)+'…'});break;
      }
    }
  }
  var h='';
  for(var r=0;r<results.length;r++){
    h+='<div class="search-result" onclick="switchConvo(\''+results[r].convoId+'\');closeSearch()"><strong>'+escHtml(results[r].title)+'</strong><br><span style="color:var(--text-3)">'+escHtml(results[r].preview)+'</span></div>';
  }
  if(!h)h='<p style="padding:var(--space-3);color:var(--text-4);font-size:var(--text-sm)">결과 없음</p>';
  el.innerHTML=h;
};

// Panels
window.toggleLeft=function(){var p=$('panelLeft');if(p)p.classList.toggle('open');};
window.toggleRight=function(){var p=$('panelRight');if(p)p.classList.toggle('open');};

// Mind map helpers
window.mmZoom=function(f){mmScale*=f;var svg=$('mmSvg');if(svg)svg.style.transform='scale('+mmScale+')';};
window.mmReset=function(){mmScale=1;var svg=$('mmSvg');if(svg)svg.style.transform='scale(1)';};
window.mmTip=function(node,evt){
  var tip=$('mmTooltip');if(!tip)return;
  var label=node.getAttribute('data-label');
  tip.textContent=label+' — 클릭하여 질문하기';
  tip.style.opacity='1';tip.style.left=(evt.offsetX+10)+'px';tip.style.top=(evt.offsetY-30)+'px';
};
window.mmHide=function(){var tip=$('mmTooltip');if(tip)tip.style.opacity='0';};

// Voice Input (STT)
var voiceRec=null,voiceActive=false;
window.toggleVoice=function(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('음성 인식 미지원 브라우저','warn');return}
  var vb=$('voiceBtn');
  if(voiceActive&&voiceRec){voiceRec.stop();return}
  if(!voiceRec){voiceRec=new SR();voiceRec.lang='ko-KR';voiceRec.interimResults=true;
    voiceRec.onresult=function(e){var t='';for(var i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;var inp=$('userInput');if(inp){inp.value=t}};
    voiceRec.onend=function(){voiceActive=false;if(vb)vb.textContent='🎤';var inp=$('userInput');if(inp&&inp.value.trim())showToast('✅ 음성 입력 완료','success')};
    voiceRec.onerror=function(e){voiceActive=false;if(vb)vb.textContent='🎤';if(e.error!=='aborted')showToast('음성 인식 실패','warn')}}
  voiceActive=true;if(vb)vb.textContent='⏹';voiceRec.start();showToast('🎙 음성 인식 중...','info')
};
// TTS (Read Aloud)
window.speakMsg=function(idx){
  var c=getActive();if(!c||!c.msgs[idx])return;
  var text=(c.msgs[idx].t||'').replace(/<[^>]*>/g,'');
  if('speechSynthesis' in window){
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);u.lang='ko-KR';u.rate=0.95;
    speechSynthesis.speak(u);showToast('읽기 시작','success');
  }else{showToast('TTS 미지원 브라우저','error');}
};

// Regen
window.regenMsg=function(idx){
  var c=getActive();if(!c||busy)return;
  showToast('답변을 재생성합니다...');
  var lastQ='';
  for(var i=idx-1;i>=0;i--){if(c.msgs[i].role==='user'){lastQ=c.msgs[i].text.replace(/<[^>]*>/g,'');break;}}
  if(lastQ)handle(lastQ);
};

// Bookmark
window.bookmarkMsg=function(idx){
  var c=getActive();if(!c||!c.msgs[idx])return;
  var preview=c.msgs[idx].text.replace(/<[^>]*>/g,'').substring(0,40)+'…';
  bookmarks.push({convoId:c.id,msgIdx:idx,preview:preview});
  saveStore();renderBookmarks();showToast('북마크 추가됨','success');
};
window.jumpBookmark=function(i){
  if(!bookmarks[i])return;
  switchConvo(bookmarks[i].convoId);
  setTimeout(function(){
    var el=$('msgArea');if(!el)return;
    var msgs=el.querySelectorAll('.msg');
    if(msgs[bookmarks[i].msgIdx]){msgs[bookmarks[i].msgIdx].scrollIntoView({behavior:'smooth',block:'center'});}
  },200);
};

// Emoji react
window.toggleEmoji=function(btn){
  var pick=btn.querySelector('.emoji-pick');if(pick)pick.classList.toggle('open');
};
window.reactMsg=function(idx,emoji,e){
  e.stopPropagation();
  var c=getActive();if(!c||!c.msgs[idx])return;
  c.msgs[idx].reaction=emoji;saveStore();
  renderDocs();showToast('반응 추가!','success');
};

// Edit user msg
window.editMsg=function(idx){
  var c=getActive();if(!c||!c.msgs[idx])return;
  var text=c.msgs[idx].text.replace(/<[^>]*>/g,'');
  var inp=$('userInput');if(inp){inp.value=text;inp.focus();}
};

// Summary
window.generateSummary=function(){
  var c=getActive();if(!c)return;
  var summary='<h3>📝 대화 요약</h3><ul>';
  var count=0;
  for(var i=0;i<c.msgs.length;i++){
    if(c.msgs[i].role==='user'){
      summary+='<li>'+escHtml(c.msgs[i].text.replace(/<[^>]*>/g,'').substring(0,60))+'</li>';
      count++;
    }
  }
  summary+='</ul><p>총 '+count+'개 질문, '+c.words+'단어 학습</p>';
  addBot(summary,null,null,false,null);
};

// Text analysis
window.analyzeText=function(){
  var ta=$('textAnalysis');if(!ta||!ta.value.trim())return showToast('분석할 텍스트를 입력하세요','warn');
  var text=ta.value.trim();
  var words=text.split(/\s+/).length;
  var chars=text.length;
  var sentences=text.split(/[.!?。]+/).filter(function(s){return s.trim();}).length;
  if(!getActive())newConvo();
  addBot('<h3>📊 텍스트 분석 결과</h3><ul><li>글자 수: <strong>'+chars+'</strong></li><li>단어 수: <strong>'+words+'</strong></li><li>문장 수: <strong>'+sentences+'</strong></li><li>평균 문장 길이: <strong>'+Math.round(words/sentences)+'</strong> 단어</li></ul>',null,null,false,null);
};

// Notes
window.saveNotes=function(){
  var n=$('quickNotes');if(n)localStorage.setItem(STORE+'_notes',n.value);
};

// Scroll detection
(function(){
  var m=$('msgArea');if(!m)return;
  m.addEventListener('scroll',function(){
    var btn=$('scrollBtn');if(!btn)return;
    btn.style.display=(m.scrollHeight-m.scrollTop-m.clientHeight>100)?'flex':'none';
  });
})();

// Streak
function updateStreakDay(){
  var key=STORE+'_streakDate',skey=STORE+'_streak';
  var last=localStorage.getItem(key);
  var today=new Date().toDateString();
  if(last!==today){
    var yesterday=new Date(Date.now()-864e5).toDateString();
    var streak=parseInt(localStorage.getItem(skey)||'0');
    streak=(last===yesterday)?streak+1:1;
    localStorage.setItem(skey,streak.toString());
    localStorage.setItem(key,today);
  }
}

// Confetti
function showConfetti(){
  var cv=document.createElement('canvas');cv.style.cssText='position:fixed;inset:0;z-index:999;pointer-events:none';
  cv.width=window.innerWidth;cv.height=window.innerHeight;document.body.appendChild(cv);
  var ctx=cv.getContext('2d'),ps=[];
  for(var i=0;i<80;i++)ps.push({x:cv.width/2,y:cv.height/2,vx:(Math.random()-.5)*12,vy:Math.random()*-12-4,c:['#3b82f6','#8b5cf6','#22c55e','#f59e0b','#ef4444'][i%5],s:Math.random()*6+3,l:1});
  (function go(){ctx.clearRect(0,0,cv.width,cv.height);var alive=false;ps.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=.3;p.l-=.015;if(p.l>0){alive=true;ctx.globalAlpha=p.l;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.s,p.s)}});if(alive)requestAnimationFrame(go);else cv.remove()})()
}

// Achievement System
var achvState=JSON.parse(localStorage.getItem('sb3_achv')||'{}');
function checkAchievements(){
  var c=getActive();if(!c)return;
  var totalQ=0,domUsed={};convos.forEach(function(cv){cv.msgs.forEach(function(m){if(m.role==='user')totalQ++});domUsed[cv.domain||'bio']=true});
  var pins=convos.filter(function(cv){return cv.pinned}).length;
  var checks=[
    {id:'first',ok:totalQ>=1},{id:'streak5',ok:totalQ>=5},
    {id:'explorer',ok:Object.keys(domUsed).length>=6},{id:'reader20',ok:totalQ>=20},
    {id:'pinner3',ok:pins>=3}
  ];
  checks.forEach(function(ch){if(ch.ok&&!achvState[ch.id]){achvState[ch.id]=true;localStorage.setItem('sb3_achv',JSON.stringify(achvState));var def=achvDefs.find(function(a){return a.id===ch.id});if(def){showConfetti();showToast('🏆 업적 달성: '+def.icon+' '+def.name,'success')}}})
}

// Sidebar Resize
(function(){var h=$('resizeHandle'),p=$('panelRight');if(!h||!p)return;var dragging=false,sx,sw;
h.addEventListener('mousedown',function(e){e.preventDefault();dragging=true;sx=e.clientX;sw=p.offsetWidth;h.classList.add('active');document.body.style.cursor='col-resize';document.body.style.userSelect='none'});
document.addEventListener('mousemove',function(e){if(!dragging)return;var w=sw-(e.clientX-sx);p.style.width=Math.max(220,Math.min(w,window.innerWidth*.5))+'px'});
document.addEventListener('mouseup',function(){if(!dragging)return;dragging=false;h.classList.remove('active');document.body.style.cursor='';document.body.style.userSelect=''});
h.addEventListener('dblclick',function(){p.style.width=''})
})();

/* ═══════════════════════════════════════════
   KEYBOARD SHORTCUTS
   ═══════════════════════════════════════════ */
document.addEventListener('keydown',function(e){
  // Ctrl+K — search
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch();}
  // Esc — close overlays
  if(e.key==='Escape'){closeSearch();var rp=$('panelRight');if(rp)rp.classList.remove('open');var lp=$('panelLeft');if(lp)lp.classList.remove('open');}
  // Alt+1~6 — domain switch
  if(e.altKey&&e.key>='1'&&e.key<='6'){
    e.preventDefault();
    var keys=Object.keys(domainMeta);var idx=parseInt(e.key)-1;
    if(keys[idx]){curDomain=keys[idx];saveStore();renderAll();}
  }
  // Alt+Z — focus mode
  if(e.altKey&&e.key==='z'){e.preventDefault();doSlash('/focus');}
  // Ctrl+/ — show shortcuts
  if((e.ctrlKey||e.metaKey)&&e.key==='/'){e.preventDefault();showToast('Ctrl+K 검색 · Alt+1~6 도메인 · Alt+Z 집중모드 · / 명령어','info');}
});

loadStore();
updateStreakDay();
// Time greeting + daily tip
(function(){var h=new Date().getHours();var gr=h<6?'🌙 밤늦게 공부하는 당신, 멋져요!':h<12?'☀️ 좋은 아침이에요!':h<18?'🌤 좋은 오후예요!':'🌙 좋은 저녁이에요!';
var tips=['💡 포모도로: 25분 집중 + 5분 휴식','💡 남에게 설명하면 기억률 90%','💡 /mindmap으로 시각 정리 = 이해력 2배','💡 수면 전 복습 → 장기기억 전환','💡 퀴즈 풀기 = 학습 효과 50% UP','💡 손글씨 > 디지털 (기억력 29%↑)'];
var ws=$('welcomeScreen');if(ws){var gt=ws.querySelector('h2');if(gt)gt.textContent=gr+' StudyBot입니다';var sub=ws.querySelector('.welcome-tip');if(!sub){sub=document.createElement('div');sub.className='welcome-tip';sub.style.cssText='font-size:var(--text-sm);color:var(--cyan);margin:var(--space-3) 0;font-style:italic';ws.insertBefore(sub,ws.children[3]||null)}sub.textContent=tips[new Date().getDate()%tips.length]}})();
if(!convos.length)newConvo();
renderAll();

// Focus input on load
setTimeout(function(){var inp=$('userInput');if(inp)inp.focus();},100);

})();
