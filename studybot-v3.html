<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="StudyBot — 문서 기반 AI 학습 챗봇. 6개 도메인, 마인드맵, 음성입력, 퀴즈, 업적 시스템.">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; font-src https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;">
<title>StudyBot — 나만의 문서 AI 튜터</title>
<meta property="og:title" content="StudyBot — 나만의 문서 AI 튜터">
<meta property="og:description" content="PDF를 업로드하면 AI가 문서 전문가가 됩니다. 마인드맵, 음성입력, 퀴즈까지.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#6366f1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   DESIGN SYSTEM — Tokens
   ══════════════════════════════════════════ */
:root {
  --bg-page: #1a1a1a;
  --bg-surface: #242424;
  --bg-elevated: #2e2e2e;
  --bg-hover: #363636;
  --text-primary: #ececec;
  --text-secondary: #999;
  --text-tertiary: #666;
  --border: #333;
  --border-hover: #444;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-soft: rgba(99,102,241,.15);
  --success: #22c55e;
  --warning: #eab308;
  --error: #ef4444;
  --cyan: #06b6d4;
  --user-bubble: #6366f1;
  --bot-bubble: #2e2e2e;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.08);
  --shadow-md: 0 2px 8px rgba(0,0,0,.12);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.2);
  --ease-out: cubic-bezier(0.16,1,0.3,1);
  --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
  --sidebar-w: 280px;
}

[data-theme="light"] {
  --bg-page: #f5f5f5;
  --bg-surface: #ffffff;
  --bg-elevated: #f0f0f0;
  --bg-hover: #e8e8e8;
  --text-primary: #1a1a1a;
  --text-secondary: #666;
  --text-tertiary: #999;
  --border: #ddd;
  --border-hover: #ccc;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --accent-soft: rgba(99,102,241,.1);
  --user-bubble: #6366f1;
  --bot-bubble: #ffffff;
  --shadow-sm: 0 1px 4px rgba(0,0,0,.05);
  --shadow-md: 0 2px 8px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.1);
}

[data-theme="highcontrast"] {
  --bg-page: #000;
  --bg-surface: #0a0a0a;
  --bg-elevated: #1a1a1a;
  --bg-hover: #2a2a2a;
  --text-primary: #fff;
  --text-secondary: #ddd;
  --text-tertiary: #aaa;
  --border: #555;
  --border-hover: #777;
  --accent: #818cf8;
  --accent-hover: #a5b4fc;
  --accent-soft: rgba(129,140,248,.2);
  --user-bubble: #818cf8;
  --bot-bubble: #1a1a1a;
}

/* ══════════════════════════════════════════
   RESET & BASE
   ══════════════════════════════════════════ */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  transition: background .3s, color .2s;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
::selection { background: var(--accent-soft); color: var(--accent); }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; color: inherit; }

/* ══════════════════════════════════════════
   ANIMATIONS
   ══════════════════════════════════════════ */
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes msgIn { from { opacity:0; transform:translateY(16px) scale(.98); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes msgUser { from { opacity:0; transform:translateX(12px); } to { opacity:1; transform:translateX(0); } }
@keyframes pop { from { opacity:0; transform:scale(.5); } to { opacity:1; transform:scale(1); } }
@keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideRight { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
@keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
@keyframes typing { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
@keyframes confettiFall { 0%{transform:translateY(-100vh) rotate(0)} 100%{transform:translateY(100vh) rotate(720deg)} }
@keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
@keyframes drawLine { to { stroke-dashoffset: 0; } }
@keyframes toastIn { from { transform:translateX(120%); opacity:0; } to { transform:translateX(0); opacity:1; } }
@keyframes toastOut { from { transform:translateX(0); opacity:1; } to { transform:translateX(120%); opacity:0; } }

/* ══════════════════════════════════════════
   LAYOUT — 2-panel
   ══════════════════════════════════════════ */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform .3s var(--ease-out), width .3s var(--ease-out);
  z-index: 20;
}
.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.sidebar-logo {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-md);
}
.sidebar-logo svg { width: 20px; height: 20px; fill: #fff; }
.sidebar-title { font-size: 1.05rem; font-weight: 700; letter-spacing: -.01em; }
.sidebar-version { font-size: 11px; color: var(--text-tertiary); font-weight: 500; }

/* Domain chips */
.domain-section { padding: 16px 16px 8px; }
.domain-section-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; padding: 0 4px; }
.domain-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.domain-chip {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  transition: all .15s;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
}
.domain-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.domain-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.domain-chip .chip-icon { font-size: 13px; }

/* Conversation list */
.convo-section { flex: 1; overflow-y: auto; padding: 8px 12px; }
.convo-group-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); padding: 12px 8px 6px; text-transform: uppercase; letter-spacing: .04em; }
.convo-item {
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: background .15s;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 2px;
  position: relative;
}
.convo-item:hover { background: var(--bg-hover); }
.convo-item.active { background: var(--accent-soft); }
.convo-item.active .convo-title { color: var(--accent); }
.convo-icon { font-size: 14px; opacity: .7; flex-shrink: 0; }
.convo-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.convo-pin { font-size: 10px; color: var(--warning); flex-shrink: 0; }
.convo-actions { display: none; gap: 4px; flex-shrink: 0; }
.convo-item:hover .convo-actions { display: flex; }
.convo-action-btn {
  width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; transition: background .15s;
}
.convo-action-btn:hover { background: var(--bg-elevated); }
.new-convo-btn {
  margin: 8px 12px;
  padding: 10px;
  border-radius: 10px;
  border: 1px dashed var(--border);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all .15s;
}
.new-convo-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

/* Streak */
.streak-section {
  padding: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.streak-fire { font-size: 20px; }
.streak-info { flex: 1; }
.streak-count { font-size: 13px; font-weight: 600; }
.streak-label { font-size: 11px; color: var(--text-tertiary); }
.streak-dots { display: flex; gap: 3px; margin-top: 4px; }
.streak-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--bg-hover);
}
.streak-dot.active { background: var(--success); }
.streak-dot.today { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

/* Settings row at bottom */
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.sidebar-footer-btn {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
  transition: all .15s;
}
.sidebar-footer-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.sidebar-footer-btn svg { width: 16px; height: 16px; }

/* ── MAIN CHAT AREA ── */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
  position: relative;
}

/* Topbar */
.topbar {
  height: 56px;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-surface);
  flex-shrink: 0;
}
.topbar-hamburger {
  display: none;
  width: 36px; height: 36px; border-radius: 8px;
  align-items: center; justify-content: center;
  color: var(--text-secondary);
}
.topbar-hamburger:hover { background: var(--bg-hover); }
.topbar-hamburger svg { width: 20px; height: 20px; }
.topbar-domain {
  font-size: 15px; font-weight: 600; letter-spacing: -.01em;
  display: flex; align-items: center; gap: 8px;
}
.topbar-domain-icon { font-size: 18px; }
.topbar-spacer { flex: 1; }
.topbar-btn {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
  transition: all .15s;
  position: relative;
}
.topbar-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.topbar-btn svg { width: 18px; height: 18px; }
.topbar-btn .badge-dot {
  position: absolute; top: 6px; right: 6px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--error);
}
.topbar-search-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-tertiary);
  display: flex; align-items: center; gap: 8px;
  transition: all .15s;
}
.topbar-search-btn:hover { border-color: var(--border-hover); color: var(--text-secondary); }
.topbar-search-btn kbd {
  font-family: var(--font);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
}

/* Messages area */
.scroll-progress { height: 2px; background: var(--bg-elevated); flex-shrink: 0; }
.scroll-progress::after { content: ''; display: block; height: 100%; width: var(--sp, 0%); background: var(--accent); transition: width .15s; border-radius: 0 1px 1px 0; }
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  scroll-behavior: smooth;
}
.messages-inner {
  max-width: 800px;
  margin: 0 auto;
}

/* Welcome screen */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 24px;
  animation: fadeIn .5s var(--ease-out);
}
.welcome-icon {
  width: 64px; height: 64px; border-radius: 18px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(99,102,241,.3);
}
.welcome-icon svg { width: 32px; height: 32px; fill: #fff; }
.welcome h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -.02em; }
.welcome p { font-size: 14px; color: var(--text-secondary); max-width: 400px; line-height: 1.6; margin-bottom: 24px; }
.welcome-suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 500px; }
.welcome-sug {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-secondary);
  transition: all .15s;
  cursor: pointer;
}
.welcome-sug:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
.daily-tip {
  margin-top: 32px;
  padding: 14px 20px;
  border-radius: 12px;
  background: var(--accent-soft);
  border: 1px solid rgba(99,102,241,.2);
  font-size: 13px;
  color: var(--text-secondary);
  max-width: 480px;
  line-height: 1.6;
}
.daily-tip strong { color: var(--accent); }

/* Message bubbles */
.msg {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  max-width: 85%;
  animation: msgIn .4s var(--ease-out);
}
.msg.user {
  margin-left: auto;
  flex-direction: row-reverse;
  animation: msgUser .3s var(--ease-out);
}
.msg-avatar {
  width: 36px; height: 36px; min-width: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  box-shadow: var(--shadow-sm);
  flex-shrink: 0;
  align-self: flex-end;
}
.msg.user .msg-avatar { background: var(--accent); color: #fff; }
.msg.bot .msg-avatar { background: var(--bg-elevated); border: 1px solid var(--border); }
.msg-content { min-width: 0; }
.msg-bubble {
  padding: 14px 18px;
  font-size: 15px;
  line-height: 1.6;
  box-shadow: var(--shadow-sm);
  word-break: break-word;
}
.msg.user .msg-bubble {
  background: var(--user-bubble);
  color: #fff;
  border-radius: 18px 18px 4px 18px;
}
.msg.bot .msg-bubble {
  background: var(--bot-bubble);
  border: 1px solid var(--border);
  border-radius: 18px 18px 18px 4px;
}
.msg-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  padding: 0 4px;
}
.msg-time { font-size: 11px; color: var(--text-tertiary); }
.msg-read { font-size: 10px; color: var(--accent); margin-left: 6px; opacity: .7; }
.msg-conf {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}
.msg-conf.high { background: rgba(34,197,94,.12); color: var(--success); }
.msg-conf.mid { background: rgba(234,179,8,.12); color: var(--warning); }
.msg-conf.low { background: rgba(239,68,68,.12); color: var(--error); }
.msg-conf-bar { width: 60px; height: 3px; background: var(--bg-hover); border-radius: 2px; margin-left: 8px; overflow: hidden; display: inline-block; vertical-align: middle; }
.msg-conf-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }
.msg-actions {
  display: flex; gap: 4px; margin-left: auto;
}
.msg-action-btn {
  width: 26px; height: 26px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  color: var(--text-tertiary);
  transition: all .15s;
}
.msg-action-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.emoji-picker { position: absolute; bottom: 100%; right: 0; display: none; gap: 2px; padding: 6px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow-lg); z-index: 10; }
.emoji-picker.show { display: flex; }
.emoji-pick { width: 32px; height: 32px; border: none; background: none; border-radius: 8px; cursor: pointer; font-size: 18px; transition: all .15s; display: flex; align-items: center; justify-content: center; }
.emoji-pick:hover { background: var(--bg-hover); transform: scale(1.2); }
.msg-reactions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.msg-reaction { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-elevated); font-size: 13px; cursor: pointer; transition: all .15s; }
.msg-reaction:hover { border-color: var(--accent); }
.msg-action-btn.bookmarked { color: var(--warning); }

/* Sources */
.msg-sources {
  margin-top: 10px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.msg-sources-toggle {
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--cyan);
  background: var(--bg-elevated);
  display: flex; align-items: center; gap: 6px;
  width: 100%;
  text-align: left;
  transition: background .15s;
}
.msg-sources-toggle:hover { background: var(--bg-hover); }
.msg-sources-toggle svg { width: 14px; height: 14px; transition: transform .2s; }
.msg-sources-toggle.open svg { transform: rotate(90deg); }
.msg-sources-list {
  padding: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s var(--ease-out), padding .3s;
  background: var(--bg-surface);
}
.msg-sources-list.open { max-height: 200px; padding: 10px 14px; }
.msg-source-item {
  font-size: 12px;
  color: var(--text-secondary);
  padding: 4px 0;
  display: flex; align-items: center; gap: 6px;
}
.msg-source-item::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--cyan); flex-shrink: 0; }

/* Typing indicator */
.typing-indicator {
  display: none;
  gap: 12px;
  margin-bottom: 16px;
  max-width: 85%;
}
.typing-indicator.show { display: flex; }
.typing-dots {
  padding: 14px 20px;
  background: var(--bot-bubble);
  border: 1px solid var(--border);
  border-radius: 18px 18px 18px 4px;
  display: flex; gap: 4px; align-items: center;
}
.typing-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-tertiary);
  animation: typing 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }
.thinking-steps { margin-top: 8px; font-size: 12px; color: var(--text-tertiary); line-height: 1.6; }
.thinking-step { opacity: 0; animation: fadeStep .3s ease forwards; }
.thinking-step::before { content: '→ '; color: var(--accent); }
@keyframes fadeStep { to { opacity: 1; } }
.proactive-suggest { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 10px 20px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--text-secondary); cursor: pointer; box-shadow: var(--shadow-md); transition: all .2s; z-index: 5; animation: fadeIn .4s ease; }
.proactive-suggest:hover { border-color: var(--accent); color: var(--accent); }

/* Suggest bar */
.suggest-bar {
  padding: 8px 24px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  flex-shrink: 0;
}
.suggest-bar:empty { display: none; padding: 0; }
.suggest-chip {
  padding: 6px 14px;
  border-radius: 16px;
  border: 1px solid var(--border);
  font-size: 12px;
  white-space: nowrap;
  color: var(--text-secondary);
  transition: all .15s;
  cursor: pointer;
  flex-shrink: 0;
}
.suggest-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

/* Input area */
.input-area {
  padding: 12px 24px 20px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

/* Resize handle */
.mindmap-resize {

/* ══════════════════════════════════════════

   ══════════════════════════════════════════ */
.toast-container {

}
.toast {

  backdrop-filter: blur(12px);
}
.toast.out { animation: toastOut .3s var(--ease-out) forwards; }
.toast.success { border-left-color: var(--success); }
.toast.warning { border-left-color: var(--warning); }
.toast.error { border-left-color: var(--error); }
.toast-icon { font-size: 16px; flex-shrink: 0; }

/* ══════════════════════════════════════════
   CONFETTI
   ══════════════════════════════════════════ */
.confetti-container {

  z-index: 300;
  overflow: hidden;
}
.confetti-piece {

  width: 10px; height: 10px;

}

/* ══════════════════════════════════════════

   ══════════════════════════════════════════ */

}

}

/* 집중 모드 */

.focus-mode .topbar { display: none; }
.focus-mode .input-area { border-top: none; }
.focus-mode .messages { padding-top: 40px; }

/* ══════════════════════════════════════════
   PRINT CSS
   ══════════════════════════════════════════ */
@media print {
  body { overflow: visible; height: auto; }
  .sidebar, .topbar, .input-area, .suggest-bar, .toast-container,
  .search-overlay, .mindmap-overlay, .mindmap-drawer,
  .msg-actions, .confetti-container { display: none !important; }
  .app { display: block; }
  .chat-area { display: block; }
  .messages { overflow: visible; padding: 0; }
  .msg { max-width: 100%; break-inside: avoid; }
  .msg.user .msg-bubble { background: #e8e8ff; color: #333; }
  .msg.bot .msg-bubble { background: #f5f5f5; color: #333; border: 1px solid #ddd; }
}
/* Ambient gradient */
.chat-area::before {
  content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background: linear-gradient(135deg, rgba(99,102,241,.04), rgba(139,92,246,.03), rgba(6,182,212,.02), rgba(34,197,94,.02));
  background-size: 400% 400%;
  animation: ambient 25s ease infinite;
}
.chat-area > * { position: relative; z-index: 1; }
@keyframes ambient { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

/* App load */
.app { animation: appLoad .6s cubic-bezier(.16,1,.3,1) backwards; }
@keyframes appLoad { from { opacity: 0; transform: scale(.98); } to { opacity: 1; transform: scale(1); } }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}
*:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
button:focus:not(:focus-visible), input:focus:not(:focus-visible), textarea:focus:not(:focus-visible) { outline: none; }

/* ══════════════════════════════════════════
   MOBILE RESPONSIVE

@media (max-width: 1024px) {

}

}

<script>
(function() {
  'use strict';

  /* ══════════════════════════════════════════
     UTILS
     ══════════════════════════════════════════ */
  function $(id) { return document.getElementById(id); }
  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
  function timeStr() {
    var d = new Date();
    var h = d.getHours(), m = d.getMinutes();
    return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
  }
  function relativeTime(ts) {
    if (!ts) return '';
    var diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 10) return '방금';
    if (diff < 60) return diff + '초 전';
    if (diff < 3600) return Math.floor(diff/60) + '분 전';
    if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
    return Math.floor(diff/86400) + '일 전';
  }
  function uid() { return '_' + Math.random().toString(36).slice(2, 9); }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  /* ══════════════════════════════════════════
     TOAST
     ══════════════════════════════════════════ */
  function showToast(msg, type) {
    type = type || 'info';
    var ct = $('toastContainer');
    if (!ct) return;
    var icons = { info: '\u2139\uFE0F', success: '\u2705', warning: '\u26A0\uFE0F', error: '\u274C' };
    var el = document.createElement('div');
    el.className = 'toast ' + type;
    el.innerHTML = '<span class="toast-icon">' + (icons[type] || '') + '</span><span class="toast-text">' + escHtml(msg) + '</span>';
    ct.appendChild(el);
    setTimeout(function() { el.classList.add('out'); setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300); }, 3000);
  }

  /* ══════════════════════════════════════════
     CONFETTI
     ══════════════════════════════════════════ */
  function showConfetti() {
    var ct = $('confettiContainer');
    if (!ct) return;
    var colors = ['#6366f1','#22c55e','#eab308','#ef4444','#06b6d4','#a78bfa','#ec4899'];
    for (var i = 0; i < 60; i++) {
      var p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random() * 100 + '%';
      p.style.background = colors[i % colors.length];
      p.style.animationDuration = (2 + Math.random() * 2) + 's';
      p.style.animationDelay = Math.random() * 0.5 + 's';
      p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      p.style.width = (6 + Math.random() * 8) + 'px';
      p.style.height = (6 + Math.random() * 8) + 'px';
      ct.appendChild(p);
    }
    setTimeout(function() { ct.innerHTML = ''; }, 4000);
  }

  /* ══════════════════════════════════════════
     STATE
     ══════════════════════════════════════════ */
  var STORE_KEY = 'studybot_v3';
  var store = loadStore();
  var activeId = store.activeId || null;
  var curDomain = store.curDomain || 'bio';
  var theme = store.theme || 'dark';
  var busy = false;
  var streamCancel = false;
  var focusMode = false;
  var ttsEnabled = false;
  var recording = false;
  var recognition = null;

  function loadStore() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || defaultStore(); }
    catch(e) { return defaultStore(); }
  }
  function defaultStore() {
    return { convos: {}, activeId: null, curDomain: 'bio', theme: 'dark', streak: { count: 0, days: [] }, achievements: [], notes: '', bookmarks: [] };
  }
  function saveStore() {
    store.activeId = activeId;
    store.curDomain = curDomain;
    store.theme = theme;
    try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch(e) {}
  }
  function getActive() {
    if (!activeId || !store.convos[activeId]) return null;
    return store.convos[activeId];
  }

  /* ══════════════════════════════════════════
     DOMAIN DATA — 6 domains, 3 Q&A each
     ══════════════════════════════════════════ */
  var domains = {
    bio: {
      name: 'Biology', icon: '\uD83E\uDDEC', color: '#22c55e',
      qa: [
        { q: 'DNA\uC640 RNA\uC758 \uCC28\uC774\uC810\uC740?', a: 'DNA\uB294 \uC774\uC911\uB098\uC120 \uAD6C\uC870\uB85C \uB514\uC625\uC2DC\uB9AC\uBCF4\uC2A4\uB97C \uD3EC\uD568\uD558\uBA70, \uC5FC\uAE30\uB85C A, T, G, C\uB97C \uC0AC\uC6A9\uD569\uB2C8\uB2E4. RNA\uB294 \uB2E8\uC77C\uB098\uC120\uC774\uBA70 \uB9AC\uBCF4\uC2A4\uB97C \uD3EC\uD568\uD558\uACE0, T \uB300\uC2E0 U(\uC6B0\uB77C\uC2E4)\uC744 \uC0AC\uC6A9\uD569\uB2C8\uB2E4. DNA\uB294 \uC720\uC804\uC815\uBCF4 \uC800\uC7A5, RNA\uB294 \uB2E8\uBC31\uC9C8 \uD569\uC131\uC5D0 \uAD00\uC5EC\uD569\uB2C8\uB2E4.', sources: ['\uBD84\uC790\uC0DD\uBB3C\uD559 \uAD50\uACFC\uC11C p.42', '\uC0DD\uD654\uD559 \uAC1C\uB860 Ch.3'], conf: 95 },
        { q: '\uAD11\uD569\uC131\uC758 \uBA85\uBC18\uC751\uACFC \uC554\uBC18\uC751\uC744 \uC124\uBA85\uD574\uC918', a: '\uBA85\uBC18\uC751\uC740 \uC5FD\uB85D\uC18C \uD2F8\uB77C\uCF54\uC774\uB4DC \uB9C9\uC5D0\uC11C \uC77C\uC5B4\uB098\uBA70, \uBE5B\uC5D0\uB108\uC9C0\uB97C \uC774\uC6A9\uD574 \uBB3C\uC744 \uBD84\uD574\uD558\uACE0 ATP\uC640 NADPH\uB97C \uC0DD\uC131\uD569\uB2C8\uB2E4. \uC554\uBC18\uC751(\uCE7C\uBE48 \uD68C\uB85C)\uC740 \uC2A4\uD2B8\uB85C\uB9C8\uC5D0\uC11C \uC9C4\uD589\uB418\uBA70, CO\u2082\uB97C \uACE0\uC815\uD558\uC5EC \uD3EC\uB3C4\uB2F9\uC744 \uD569\uC131\uD569\uB2C8\uB2E4.', sources: ['\uC2DD\uBB3C\uC0DD\uB9AC\uD559 p.88', '\uC0DD\uBB3C\uD559 \uAC1C\uB860 Ch.6'], conf: 92 },
        { q: '\uC138\uD3EC \uBD84\uC5F4\uC758 \uB2E8\uACC4\uB97C \uC124\uBA85\uD574\uC918', a: '\uC138\uD3EC \uBD84\uC5F4\uC740 \uAC04\uAE30(G1\u2192S\u2192G2)\uC640 \uBD84\uC5F4\uAE30(M\uAE30)\uB85C \uB098\uB261\uB2C8\uB2E4. \uBD84\uC5F4\uAE30\uB294 \uC804\uAE30(\uC5FC\uC0C9\uCCB4 \uC751\uCD95), \uC911\uAE30(\uC5FC\uC0C9\uCCB4 \uC815\uB82C), \uD6C4\uAE30(\uC5FC\uC0C9\uCCB4 \uBD84\uB9AC), \uB9D0\uAE30(\uD575 \uC7AC\uD615\uC131)\uC758 4\uB2E8\uACC4\uB85C \uC9C4\uD589\uB429\uB2C8\uB2E4.', sources: ['\uC138\uD3EC\uC0DD\uBB3C\uD559 p.34', '\uC0DD\uBB3C\uD559 \uAC1C\uB860 Ch.4'], conf: 97 }
      ]
    },
    cook: {
      name: 'Cooking', icon: '\uD83C\uDF73', color: '#f59e0b',
      qa: [
        { q: '\uB9C8\uC774\uC57C\uB974 \uBC18\uC751\uC774\uB780?', a: '\uB9C8\uC774\uC57C\uB974 \uBC18\uC751\uC740 \uC544\uBBF8\uB178\uC0B0\uACFC \uD658\uC6D0\uB2F9\uC774 \uACE0\uC628\uC5D0\uC11C \uBC18\uC751\uD558\uC5EC \uAC08\uC0C9 \uBB3C\uC9C8\uACFC \uD48D\uBBF8 \uD654\uD569\uBB3C\uC744 \uC0DD\uC131\uD558\uB294 \uBE44\uD6A8\uC18C\uC801 \uAC08\uBCC0 \uBC18\uC751\uC785\uB2C8\uB2E4. \uC2A4\uD14C\uC774\uD06C \uAD6C\uC6B8 \uB54C\uC758 \uAC08\uC0C9 \uD45C\uBA74, \uBE75\uC758 \uAD6D\uBD88\uC774 \uB300\uD45C\uC801\uC785\uB2C8\uB2E4.', sources: ['\uC2DD\uD488\uD654\uD559 \uAC1C\uB860 p.156', '\uC870\uB9AC\uACFC\uD559 Ch.7'], conf: 94 },
        { q: '\uC720\uD654\uC81C\uC758 \uC6D0\uB9AC\uB294?', a: '\uC720\uD654\uC81C\uB294 \uCE5C\uC218\uC131 \uBD80\uBD84\uACFC \uC18C\uC218\uC131 \uBD80\uBD84\uC744 \uBAA8\uB450 \uAC00\uC9C4 \uBD84\uC790\uB85C, \uBB3C\uACFC \uAE30\uB984\uC758 \uACC4\uBA74 \uC7A5\uB825\uC744 \uB0AE\uCDB0 \uC549\uC815\uC801\uC778 \uD63C\uD569\uBB3C\uC744 \uB9CC\uB4ED\uB2C8\uB2E4. \uB2EC\uAC40 \uB178\uB978\uC790\uC758 \uB808\uC2DC\uD2F4\uC774 \uB300\uD45C\uC801\uC778 \uCC9C\uC5F0 \uC720\uD654\uC81C\uC785\uB2C8\uB2E4.', sources: ['\uC2DD\uD488\uD654\uD559 p.203', '\uC870\uB9AC\uC6D0\uB9AC Ch.5'], conf: 91 },
        { q: '\uAE00\uB8E8\uD150 \uD504\uB9AC \uBCA0\uC774\uD0B9\uC758 \uC6D0\uB9AC\uB294?', a: '\uAE00\uB8E8\uD150\uC740 \uBC00\uAC00\uB8E8\uC758 \uB2E8\uBC31\uC9C8\uB85C \uBC18\uC8FD\uC758 \uD0C4\uB825\uC131\uACFC \uAD6C\uC870\uB97C \uB2F4\uB2F9\uD569\uB2C8\uB2E4. \uAE00\uB8E8\uD150 \uD504\uB9AC\uC5D0\uC11C\uB294 \uC300\uAC00\uB8E8, \uC544\uBAAC\uB4DC\uAC00\uB8E8, \uC804\uBD84 \uB4F1\uC73C\uB85C \uB300\uCCB4\uD558\uBA70, \uC794\uD0C4\uAC80 \uAC19\uC740 \uACB0\uD569\uC81C\uB97C \uCD94\uAC00\uD569\uB2C8\uB2E4.', sources: ['\uC2DD\uD488\uACFC\uD559 p.89', '\uBCA0\uC774\uD0B9 \uC785\uBB38 Ch.3'], conf: 88 }
      ]
    },
    sport: {
      name: 'Sports Science', icon: '\u26BD', color: '#3b82f6',

  function renderConvos() {
    var el = $('convoList');
    if (!el) return;
    var ids = Object.keys(store.convos).sort(function(a, b) {
      return (store.convos[b].updated || 0) - (store.convos[a].updated || 0);
    });
    if (ids.length === 0) {
      el.innerHTML = '<div style="padding:24px 16px;text-align:center;color:var(--text-tertiary);font-size:13px;">대화가 없습니다.<br>질문을 입력해 시작하세요!</div>';
      return;
    }
    var now = Date.now();
    var day = 86400000;
    var groups = { today: [], yesterday: [], week: [], older: [] };
    ids.forEach(function(id) {
      var c = store.convos[id];
      var diff = now - (c.updated || 0);
      if (diff < day) groups.today.push(id);
      else if (diff < 2 * day) groups.yesterday.push(id);
      else if (diff < 7 * day) groups.week.push(id);
      else groups.older.push(id);
    });
    var html = '';
    function addGroup(label, list) {

      html += '<div class="convo-group-label">' + label + '</div>';

        var c = store.convos[id];
        var pinHtml = c.pinned ? '<span class="convo-pin" title="고정됨">\uD83D\uDCCC</span>' : '';
        var lastMsg = c.msgs && c.msgs.length ? (c.msgs[c.msgs.length-1].text||'').replace(/<[^>]+>/g,'').slice(0,60) : '';

    addGroup('이번 주', groups.week);
    addGroup('이전', groups.older);

  /* ══════════════════════════════════════════
     STREAK
     ══════════════════════════════════════════ */
  function updateStreak() {
    var today = new Date().toISOString().slice(0, 10);
    if (!store.streak) store.streak = { count: 0, days: [] };
    if (store.streak.days.indexOf(today) === -1) {
      store.streak.days.push(today);
      /* Check consecutive */
      var sorted = store.streak.days.slice().sort().reverse();
      var count = 1;
      for (var i = 1; i < sorted.length; i++) {
        var prev = new Date(sorted[i - 1]);
        var cur = new Date(sorted[i]);
        var diff = (prev - cur) / 86400000;
        if (diff === 1) count++;
        else break;
      }
      store.streak.count = count;
      saveStore();
    }
    renderStreak();
  }

  function renderStreak() {
    var el = $('streakCount');
    if (el) el.textContent = (store.streak ? store.streak.count : 0) + ' day streak';
    var dotsEl = $('streakDots');
    if (!dotsEl) return;
    var today = new Date();
    var html = '';
    for (var i = 6; i >= 0; i--) {
      var d = new Date(today);
      d.setDate(d.getDate() - i);
      var ds = d.toISOString().slice(0, 10);
      var active = store.streak && store.streak.days && store.streak.days.indexOf(ds) !== -1;
      var isToday = i === 0;
      html += '<div class="streak-dot' + (active ? ' active' : '') + (isToday ? ' today' : '') + '" title="' + ds + '"></div>';
    }
    dotsEl.innerHTML = html;
  }

  /* ══════════════════════════════════════════
     MESSAGES — Core engine
     ══════════════════════════════════════════ */
  function ensureConvo() {
    if (!activeId || !store.convos[activeId]) {
      activeId = uid();
      store.convos[activeId] = {
        id: activeId,
        domain: curDomain,
        title: '새 대화',
        msgs: [],
        pinned: false,
        created: Date.now(),
        updated: Date.now()
      };
      saveStore();
      renderConvos();
    }
    return store.convos[activeId];
  }

  function pushMsg(convo, msg) {
    convo.msgs.push(msg);
    convo.updated = Date.now();
    if (convo.msgs.length === 1 && msg.role === 'user') {
      convo.title = msg.text.slice(0, 40);
    }
    saveStore();
    renderConvos();
    var wcd=$('wordCountDisplay');if(wcd){var wc=convo.msgs.reduce(function(a,m){return a+(m.text||'').replace(/<[^>]+>/g,'').split(/\s+/).filter(function(w){return w}).length},0);wcd.textContent=wc+' 단어'}
  }

  function addUser(text) {
    var convo = ensureConvo();
    var msg = { role: 'user', text: text, time: timeStr(), ts: Date.now() };
    pushMsg(convo, msg);
    renderChat();
    scrollToBottom();
    updateStreak();
    return convo;
  }

  function addBot(text, sources, conf, doStream) {
    var convo = getActive();
    if (!convo) return;
    var msg = { role: 'bot', text: doStream ? '' : text, sources: sources || [], conf: conf || 0, time: timeStr(), ts: Date.now() };
    pushMsg(convo, msg);
    if (doStream) {
      showTyping();
      streamText(text, msg, function() {
        hideTyping();
        renderChat();
        checkAchievements();
        if (ttsEnabled) speakText(text);
      });
    } else {
      renderChat();
      checkAchievements();
      if (ttsEnabled) speakText(text);
    }
  }

  var thinkingSteps=['문서 검색 중...','관련 섹션 분석 중...','답변 생성 중...','출처 검증 중...'];
  function showTyping() {
    var el = $('typingIndicator');
    if (!el) return; el.classList.add('show');
    var dots=el.querySelector('.typing-dots');
    if(dots){var sd=dots.querySelector('.thinking-steps');if(!sd){sd=document.createElement('div');sd.className='thinking-steps';dots.appendChild(sd)}sd.innerHTML='';
    var si=0;var iv=setInterval(function(){if(si>=thinkingSteps.length||!el.classList.contains('show')){clearInterval(iv);return}var s=document.createElement('div');s.className='thinking-step';s.style.animationDelay=(si*0.15)+'s';s.textContent=thinkingSteps[si];sd.appendChild(s);si++},400)}
    scrollToBottom();
  }
  function hideTyping() {
    var el = $('typingIndicator');
    if (!el) return; el.classList.remove('show');
    var sd=el.querySelector('.thinking-steps');if(sd)sd.innerHTML='';
  }

  /* Streaming typewriter */
  function streamText(fullText, msg, done) {
    var i = 0;
    var inner = $('messagesInner');
    streamCancel = false;
    function tick() {
      if (streamCancel) {
        /* Do NOT call done() on cancel */
        return;
      }
      if (i <= fullText.length) {
        msg.text = fullText.slice(0, i);
        saveStore();
        if (inner) {
          var convo = getActive();
          if (convo && convo.msgs) {
            var lastIdx = convo.msgs.length - 1;
            var msgEls = inner.querySelectorAll('.msg');
            if (msgEls[lastIdx]) {
              var bubble = msgEls[lastIdx].querySelector('.msg-bubble');
              if (bubble) bubble.innerHTML = formatBotText(msg.text);
            }
          }
        }
        scrollToBottom();
        i++;
        setTimeout(tick, 12 + Math.random() * 8);
      } else {
        done();
      }
    }
    renderChat();
    tick();
  }

  /* ══════════════════════════════════════════
     RESOLVE — Match input to domain Q&A
     ══════════════════════════════════════════ */
  function resolve(text) {
    var d = domains[curDomain];
    if (!d) return null;
    var lower = text.toLowerCase();
    var best = null;
    var bestScore = 0;
    d.qa.forEach(function(qa) {
      var words = qa.q.toLowerCase().split(/\s+/);
      var score = 0;
      words.forEach(function(w) {
        if (w.length > 1 && lower.indexOf(w) !== -1) score++;
      });
      if (score > bestScore) { bestScore = score; best = qa; }
    });
    if (bestScore >= 1) return best;
    return null;
  }

  function handle(text) {
    if (busy) return;
    text = text.trim();
    if (!text) return;

    /* Slash command */
    if (text.charAt(0) === '/') {
      doSlash(text);
      return;
    }

    busy = true;
    addUser(text);

    var match = resolve(text);
    if (match) {
      setTimeout(function() {
        addBot(match.a, match.sources, match.conf, true);
        busy = false;
      }, 600);
    } else {
      setTimeout(function() {
        var fallback = '\uD574\uB2F9 \uC9C8\uBB38\uC5D0 \uB300\uD55C \uB370\uC774\uD130\uB97C \uCC3E\uC9C0 \uBABB\uD588\uC2B5\uB2C8\uB2E4. ' + (domains[curDomain] ? domains[curDomain].name : '') + ' \uB3C4\uBA54\uC778\uC758 \uC608\uC2DC \uC9C8\uBB38\uC744 \uC2DC\uB3C4\uD574\uBCF4\uC138\uC694. /help \uBA85\uB839\uC5B4\uB85C \uB3C4\uC6C0\uB9D0\uC744 \uD655\uC778\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.';
        addBot(fallback, [], 0, true);
        busy = false;
      }, 400);
    }
  }

  /* ══════════════════════════════════════════
     SLASH COMMANDS
     ══════════════════════════════════════════ */
  function doSlash(text) {
    var parts = text.split(/\s+/);
    var cmd = parts[0].toLowerCase();
    var arg = parts.slice(1).join(' ');
    var found = slashCommands.find(function(c) { return c.cmd === cmd; });
    if (found) {
      found.fn(arg);
    } else {
      showToast('알 수 없는 명령어: ' + cmd, 'warning');
    }
  }

  function cmdHelp() {
    var text = '\uC0AC\uC6A9 \uAC00\uB2A5\uD55C \uBA85\uB839\uC5B4:\n\n';
    slashCommands.forEach(function(c) { text += c.cmd + ' \u2014 ' + c.desc + '\n'; });

  function checkAchievements() {
    if (!store.achievements) store.achievements = [];
    var totalQ = 0;
    var domainsUsed = {};
    Object.keys(store.convos).forEach(function(id) {
      var c = store.convos[id];

      streak: store.streak ? store.streak.count : 0,
      bookmarks: store.bookmarks ? store.bookmarks.length : 0

    achievementDefs.forEach(function(a) {
      if (store.achievements.indexOf(a.id) === -1 && a.cond(stats)) {

     FEATURES — Voice (STT + TTS)
     ══════════════════════════════════════════ */
  function toggleVoice() {
    var btn = $('voiceBtn');
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      showToast('이 브라우저에서 음성 인식을 지원하지 않습니다', 'error');
      return;
    }
    if (recording) {
      if (recognition) recognition.stop();
      recording = false;
      if (btn) btn.classList.remove('recording');
      return;
    }
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'ko-KR';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onresult = function(e) {
      var text = e.results[0][0].transcript;
      var input = $('chatInput');
      if (input) { input.value = text; autoResizeInput(); updateSendBtn(); }
      recording = false;
      if (btn) btn.classList.remove('recording');
    };
    recognition.onerror = function() {
      recording = false;
      if (btn) btn.classList.remove('recording');
      showToast('음성 인식 실패', 'error');
    };
    recognition.onend = function() {
      recording = false;
      if (btn) btn.classList.remove('recording');
    };
    recognition.start();
    recording = true;
    if (btn) btn.classList.add('recording');
    showToast('🎙 듣고 있습니다... 말씀하세요', 'info');
  }

    window.speechSynthesis.cancel();

    utt.rate = 0.9;
    window.speechSynthesis.speak(utt);

  /* ══════════════════════════════════════════
     FEATURES — 마인드맵 (SVG, auto-width nodes)
     ══════════════════════════════════════════ */
  var mmZoom = 1;
  var mmPanX = 0, mmPanY = 0;
  var mmDragging = false, mmDragStartX, mmDragStartY, mmStartPanX, mmStartPanY;

  function openMindmap() {
    var overlay = $('mindmapOverlay');
    var drawer = $('mindmapDrawer');

  function closeMindmap() {

  }

  function renderMindmap() {
    var svg = $('mindmapSvg');
    if (!svg) return;
    var data = mmData[curDomain];
    if (!data) return;

    /* Measure text widths using canvas */
    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d');

    function measureText(text, fontSize) {
      ctx.font = fontSize + 'px Inter, sans-serif';
      return ctx.measureText(text).width;
    }

    /* Layout computation */
    var nodeSpacingY = 60;
    var levelSpacingX = 220;
    var rootX = 80;
    var rootY = 250;
    var nodes = [];
    var links = [];

    /* Flatten tree */
    function layoutNode(node, level, yOffset) {
      var fontSize = level === 0 ? 16 : (level === 1 ? 14 : 13);
      var textW = measureText(node.label, fontSize);
      var padX = level === 0 ? 28 : (level === 1 ? 20 : 16);
      var padY = level === 0 ? 14 : (level === 1 ? 10 : 8);
      var w = textW + padX * 2;
      var h = fontSize + padY * 2;
      var x = rootX + level * levelSpacingX;
      var y = yOffset;

      var n = { label: node.label, x: x, y: y, w: w, h: h, level: level, fontSize: fontSize };
      nodes.push(n);

      if (node.children && node.children.length > 0) {
        var totalH = (node.children.length - 1) * nodeSpacingY;
        var startY = y - totalH / 2;
        node.children.forEach(function(child, i) {
          var childY = startY + i * nodeSpacingY;
          var childNode = layoutNode(child, level + 1, childY);
          links.push({ from: n, to: childNode });
        });
      }
      return n;
    }

    layoutNode(data, 0, rootY);

    /* Build SVG */
    var svgWidth = 800;
    var svgHeight = 500;
    var inner = '';

    /* Gradient defs */
    inner += '<defs>';
    inner += '<linearGradient id="mmGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="' + (domains[curDomain] ? domains[curDomain].color : '#6366f1') + '"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>';
    inner += '<linearGradient id="mmLinkGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="' + (domains[curDomain] ? domains[curDomain].color : '#6366f1') + '" stop-opacity="0.6"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0.3"/></linearGradient>';
    inner += '</defs>';

    /* Links — smooth cubic bezier */
    links.forEach(function(l) {
      var x1 = l.from.x + l.from.w;
      var y1 = l.from.y;
      var x2 = l.to.x;
      var y2 = l.to.y;
      var cx = (x1 + x2) / 2;
      inner += '<path d="M' + x1 + ',' + y1 + ' C' + cx + ',' + y1 + ' ' + cx + ',' + y2 + ' ' + x2 + ',' + y2 + '" fill="none" stroke="url(#mmLinkGrad)" stroke-width="2" opacity="0.7"/>';
    });

    /* Nodes */
    nodes.forEach(function(n) {
      var rx = n.level === 0 ? n.h / 2 : (n.level === 1 ? 10 : 8);
      var fill, textFill, stroke;
      if (n.level === 0) {
        fill = 'url(#mmGrad)';
        textFill = '#fff';
        stroke = 'none';
      } else if (n.level === 1) {
        fill = 'var(--bg-elevated)';
        textFill = 'var(--text-primary)';
        stroke = 'var(--border)';
      } else {
        fill = 'var(--bg-surface)';
        textFill = 'var(--text-secondary)';
        stroke = 'var(--border)';
      }
      inner += '<g class="mm-node">';
      inner += '<rect x="' + (n.x) + '" y="' + (n.y - n.h / 2) + '" width="' + n.w + '" height="' + n.h + '" rx="' + rx + '" fill="' + fill + '"' + (stroke !== 'none' ? ' stroke="' + stroke + '" stroke-width="1"' : '') + ' style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.15))"/>';
      inner += '<text x="' + (n.x + n.w / 2) + '" y="' + (n.y + n.fontSize * 0.35) + '" text-anchor="middle" fill="' + textFill + '" font-size="' + n.fontSize + '" font-family="Inter, sans-serif" font-weight="' + (n.level === 0 ? '700' : '500') + '">' + escHtml(n.label) + '</text>';
      inner += '</g>';
    });

    svg.setAttribute('viewBox', '0 0 ' + svgWidth + ' ' + svgHeight);
    svg.innerHTML = '<g id="mmGroup" transform="translate(' + mmPanX + ',' + mmPanY + ') scale(' + mmZoom + ')">' + inner + '</g>';
  }

  function updateMmTransform() {
    var g = document.getElementById('mmGroup');
    if (g) g.setAttribute('transform', 'translate(' + mmPanX + ',' + mmPanY + ') scale(' + mmZoom + ')');
  }

  function openSearch() {
    var overlay = $('searchOverlay');
    var input = $('searchInput');
    if (overlay) overlay.classList.add('show');

    doSearch('');

  function closeSearch() {
    var overlay = $('searchOverlay');
    if (overlay) overlay.classList.remove('show');

  function doSearch(query) {
    var results = $('searchResults');
    if (!results) return;
    if (!query) { results.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-tertiary);font-size:13px;">대화를 검색하세요...</div>'; return; }
    var lower = query.toLowerCase();
    var found = [];
    Object.keys(store.convos).forEach(function(id) {
      var c = store.convos[id];
      if (c.msgs) {
        c.msgs.forEach(function(m, idx) {
          if (m.text && m.text.toLowerCase().indexOf(lower) !== -1) {
            found.push({ convoId: id, convoTitle: c.title, text: m.text, idx: idx, role: m.role });
          }
        });
      }
    });
    if (found.length === 0) {
      results.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-tertiary);font-size:13px;">No results found.</div>';
      return;
    }
    results.innerHTML = found.slice(0, 20).map(function(r) {
      var snippet = r.text.slice(0, 80);
      var highlighted = snippet.replace(new RegExp('(' + escHtml(query).replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>');
      return '<div class="search-result-item" data-convoid="' + r.convoId + '" data-idx="' + r.idx + '">' +
        '<span class="search-result-icon">' + (r.role === 'user' ? '\uD83D\uDC64' : '\uD83E\uDD16') + '</span>' +
        '<span class="search-result-text">' + highlighted + '</span></div>';
    }).join('');
  }

  /* ══════════════════════════════════════════
     SLASH AUTOCOMPLETE
     ══════════════════════════════════════════ */
  var slashMenuIdx = -1;

  function showSlashMenu(filter) {
    var menu = $('slashMenu');
    if (!menu) return;
    var filtered = slashCommands.filter(function(c) {
      return c.cmd.indexOf(filter) === 0;
    });
    if (filtered.length === 0) { hideSlashMenu(); return; }
    slashMenuIdx = 0;
    menu.innerHTML = filtered.map(function(c, i) {
      return '<div class="slash-item' + (i === 0 ? ' active' : '') + '" data-cmd="' + c.cmd + '">' +
        '<span class="slash-item-icon">' + c.icon + '</span>' +
        '<div class="slash-item-text"><div class="slash-item-name">' + c.cmd + '</div><div class="slash-item-desc">' + c.desc + '</div></div></div>';
    }).join('');
    menu.classList.add('show');
  }

  function hideSlashMenu() {
    var menu = $('slashMenu');
    if (menu) { menu.classList.remove('show'); menu.innerHTML = ''; }
    slashMenuIdx = -1;
  }

  function navigateSlashMenu(dir) {
    var menu = $('slashMenu');
    if (!menu) return;
    var items = menu.querySelectorAll('.slash-item');
    if (items.length === 0) return;
    items[slashMenuIdx].classList.remove('active');
    slashMenuIdx = (slashMenuIdx + dir + items.length) % items.length;
    items[slashMenuIdx].classList.add('active');
    items[slashMenuIdx].scrollIntoView({ block: 'nearest' });
  }

  function selectSlashItem() {
    var menu = $('slashMenu');
    if (!menu) return;
    var items = menu.querySelectorAll('.slash-item');
    if (items.length === 0 || slashMenuIdx < 0) return;
    var cmd = items[slashMenuIdx].getAttribute('data-cmd');
    var input = $('chatInput');
    if (input) { input.value = cmd + ' '; input.focus(); }
    hideSlashMenu();
  }

  /* ══════════════════════════════════════════
     MIND MAP — Resize handle
     ══════════════════════════════════════════ */
  function initMindmapResize() {
    var handle = $('mindmapResize');
    var drawer = $('mindmapDrawer');
    if (!handle || !drawer) return;
    var resizing = false;
    var startX, startW;
    handle.addEventListener('mousedown', function(e) {
      resizing = true;
      startX = e.clientX;
      startW = drawer.offsetWidth;
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (!resizing) return;
      var diff = startX - e.clientX;
      var newW = clamp(startW + diff, 320, window.innerWidth * 0.8);
      drawer.style.width = newW + 'px';
    });
    document.addEventListener('mouseup', function() { resizing = false; });
  }

  /* ══════════════════════════════════════════
     MIND MAP — Pan & Zoom
     ══════════════════════════════════════════ */
  function initMindmapPanZoom() {
    var canvas = $('mindmapCanvas');
    if (!canvas) return;
    canvas.addEventListener('mousedown', function(e) {
      if (e.target.closest('.mm-node')) return;
      mmDragging = true;
      mmDragStartX = e.clientX;
      mmDragStartY = e.clientY;
      mmStartPanX = mmPanX;
      mmStartPanY = mmPanY;
    });
    document.addEventListener('mousemove', function(e) {
      if (!mmDragging) return;
      mmPanX = mmStartPanX + (e.clientX - mmDragStartX);
      mmPanY = mmStartPanY + (e.clientY - mmDragStartY);
      updateMmTransform();
    });
    document.addEventListener('mouseup', function() { mmDragging = false; });
    canvas.addEventListener('wheel', function(e) {
      e.preventDefault();
      var delta = e.deltaY > 0 ? -0.1 : 0.1;
      mmZoom = clamp(mmZoom + delta, 0.3, 3);
      updateMmTransform();
    }, { passive: false });
  }

  /* ══════════════════════════════════════════
     MIND MAP — PNG 내보내기
     ══════════════════════════════════════════ */
  function exportMindmapPng() {
    var svg = $('mindmapSvg');
    if (!svg) return;
    var svgData = new XMLSerializer().serializeToString(svg);
    var canvas = document.createElement('canvas');
    canvas.width = 1600;
    canvas.height = 1000;
    var cCtx = canvas.getContext('2d');
    var img = new Image();
    img.onload = function() {
      cCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-page') || '#1a1a1a';
      cCtx.fillRect(0, 0, 1600, 1000);
      cCtx.drawImage(img, 0, 0, 1600, 1000);
      var a = document.createElement('a');
      a.download = 'mindmap-' + curDomain + '.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
      showToast('마인드맵 PNG 다운로드 완료', 'success');
    };
    img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
  }

  /* ══════════════════════════════════════════
     INIT — Event binding
     ══════════════════════════════════════════ */
  function init() {
    /* Apply stored theme */
    document.documentElement.setAttribute('data-theme', theme);

    /* Render initial state */
    renderDomainChips();
    updateTopbar();
    renderConvos();
    renderStreak();

    /* If we have an active convo, render it */
    if (activeId && store.convos[activeId]) {
      curDomain = store.convos[activeId].domain || curDomain;
      renderDomainChips();
      updateTopbar();
    }
    renderChat();

    /* ── Domain chips (event delegation) ── */
    var domainChipsEl = $('domainChips');
    if (domainChipsEl) domainChipsEl.addEventListener('click', function(e) {
      var chip = e.target.closest('.domain-chip');
      if (!chip) return;
      var key = chip.getAttribute('data-domain');
      if (key && domains[key]) {
        curDomain = key;
        saveStore();
        renderDomainChips();
        updateTopbar();
        renderChat();
        renderSuggestions();
      }
    });

    /* ── Conversation list (event delegation) ── */
    var convoListEl = $('convoList');
    if (convoListEl) convoListEl.addEventListener('click', function(e) {
      /* Action buttons */
      var actionBtn = e.target.closest('.convo-action-btn');
      if (actionBtn) {
        var action = actionBtn.getAttribute('data-action');
        var id = actionBtn.getAttribute('data-id');
        if (action === 'delete' && id) {
          delete store.convos[id];
          if (activeId === id) activeId = null;
          saveStore();
          renderConvos();
          renderChat();
        } else if (action === 'pin' && id && store.convos[id]) {
          store.convos[id].pinned = !store.convos[id].pinned;
          saveStore();
          renderConvos();
        }
        return;
      }
      /* Select conversation */
      var item = e.target.closest('.convo-item');
      if (!item) return;
      var id = item.getAttribute('data-id');
      if (id && store.convos[id]) {
        streamCancel = true;
        activeId = id;
        curDomain = store.convos[id].domain || curDomain;
        saveStore();
        renderConvos();
        renderDomainChips();
        updateTopbar();
        renderChat();
      }
    });

    /* ── New conversation ── */
    var newBtn = $('newConvoBtn');
    if (newBtn) newBtn.addEventListener('click', function() { cmdNew(); });

    /* ── Chat input ── */
    var chatInput = $('chatInput');
    if (chatInput) {
      chatInput.addEventListener('input', function() {
        autoResizeInput();
        updateSendBtn();
        /* Slash autocomplete */
        var val = chatInput.value;
        if (val.charAt(0) === '/' && val.indexOf(' ') === -1) {
          showSlashMenu(val);
        } else {
          hideSlashMenu();
        }
      });
      chatInput.addEventListener('keydown', function(e) {
        var menu = $('slashMenu');
        var menuVisible = menu && menu.classList.contains('show');
        if (menuVisible) {
          if (e.key === 'ArrowDown') { e.preventDefault(); navigateSlashMenu(1); return; }
          if (e.key === 'ArrowUp') { e.preventDefault(); navigateSlashMenu(-1); return; }
          if (e.key === 'Tab' || e.key === 'Enter') { e.preventDefault(); selectSlashItem(); return; }
          if (e.key === 'Escape') { e.preventDefault(); hideSlashMenu(); return; }
        }
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });
    }

    /* ── Send button ── */
    var sendBtn = $('sendBtn');
    if (sendBtn) sendBtn.addEventListener('click', send);

    /* ── Voice button ── */
    var voiceBtn = $('voiceBtn');
    if (voiceBtn) voiceBtn.addEventListener('click', toggleVoice);

    /* ── Messages area (event delegation for sources, bookmarks, copy, read) ── */
    var messagesInner = $('messagesInner');
    if (messagesInner) messagesInner.addEventListener('click', function(e) {
      /* Sources toggle */
      var srcToggle = e.target.closest('.msg-sources-toggle');
      if (srcToggle) {
        var idx = srcToggle.getAttribute('data-idx');
        srcToggle.classList.toggle('open');
        var list = messagesInner.querySelector('.msg-sources-list[data-idx="' + idx + '"]');
        if (list) list.classList.toggle('open');
        return;
      }
      /* Message action buttons */
      var actionBtn = e.target.closest('.msg-action-btn');
      if (actionBtn) {
        var action = actionBtn.getAttribute('data-action');
        var msgIdx = parseInt(actionBtn.getAttribute('data-idx'), 10);
        var convo = getActive();
        if (!convo || !convo.msgs) return;
        if (action === 'bookmark') {
          toggleBookmark(msgIdx);
        } else if (action === 'copy') {
          var msg = convo.msgs[msgIdx];
          if (msg && navigator.clipboard) {
            navigator.clipboard.writeText(msg.text).then(function() { showToast('클립보드에 복사됨', 'success'); });
          }
        } else if (action === 'read') {
          var msg = convo.msgs[msgIdx];
          if (msg) speakText(msg.text);
        }
        return;
      }
      /* Welcome suggestions */
      var sug = e.target.closest('.welcome-sug');
      if (sug) {
        var q = sug.getAttribute('data-q');
        if (q) handle(q);
        return;
      }
    });

    /* ── Suggest bar (event delegation) ── */
    var suggestBar = $('suggestBar');
    if (suggestBar) suggestBar.addEventListener('click', function(e) {
      var chip = e.target.closest('.suggest-chip');
      if (!chip) return;
      var q = chip.getAttribute('data-q');
      if (q) handle(q);
    });

    /* ── Slash menu (event delegation) ── */
    var slashMenu = $('slashMenu');
    if (slashMenu) slashMenu.addEventListener('click', function(e) {
      var item = e.target.closest('.slash-item');
      if (!item) return;
      var cmd = item.getAttribute('data-cmd');
      var input = $('chatInput');
      if (input && cmd) { input.value = cmd + ' '; input.focus(); }
      hideSlashMenu();
    });

    /* ── Topbar buttons ── */
    var topbarSearch = $('topbarSearch');
    if (topbarSearch) topbarSearch.addEventListener('click', openSearch);

    var mindmapBtn = $('mindmapBtn');
    if (mindmapBtn) mindmapBtn.addEventListener('click', openMindmap);

    var ttsToggleBtn = $('ttsToggle');
    if (ttsToggleBtn) ttsToggleBtn.addEventListener('click', function() {
      ttsEnabled = !ttsEnabled;
      showToast(ttsEnabled ? '🔊 읽어주기 ON' : '🔊 읽어주기 OFF', 'info');
    });

    var focusBtnEl = $('focusBtn');
    if (focusBtnEl) focusBtnEl.addEventListener('click', toggleFocus);

    /* ── Hamburger (mobile) ── */
    var hamburger = $('hamburgerBtn');
    var sidebar = $('sidebar');
    var backdrop = $('sidebarBackdrop');
    if (hamburger) hamburger.addEventListener('click', function() {
      if (sidebar) sidebar.classList.toggle('open');
      if (backdrop) backdrop.classList.toggle('show');
    });
    if (backdrop) backdrop.addEventListener('click', function() {
      if (sidebar) sidebar.classList.remove('open');
      backdrop.classList.remove('show');
    });

    /* ── Sidebar footer buttons ── */
    var themeToggle = $('themeToggle');
    if (themeToggle) themeToggle.addEventListener('click', cycleTheme);

    var shortcutsBtn = $('shortcutsBtn');
    if (shortcutsBtn) shortcutsBtn.addEventListener('click', toggleShortcuts);

    var notesBtn = $('notesBtn');
    if (notesBtn) notesBtn.addEventListener('click', openNotes);

    var bookmarksBtn = $('bookmarksBtn');
    if (bookmarksBtn) bookmarksBtn.addEventListener('click', function() {
      var overlay = $('bookmarksOverlay');
      if (overlay) { overlay.classList.add('show'); render북마크(); }
    });

    /* ── Overlay close buttons ── */
    var mindmapClose = $('mindmapClose');
    if (mindmapClose) mindmapClose.addEventListener('click', closeMindmap);

    var mindmapOverlay = $('mindmapOverlay');
    if (mindmapOverlay) mindmapOverlay.addEventListener('click', closeMindmap);

    var achieveClose = $('achieveClose');
    if (achieveClose) achieveClose.addEventListener('click', function() {
      var overlay = $('achieveOverlay');
      if (overlay) overlay.classList.remove('show');
    });

    var notesClose = $('notesClose');
    if (notesClose) notesClose.addEventListener('click', closeNotes);

    var bookmarksClose = $('bookmarksClose');
    if (bookmarksClose) bookmarksClose.addEventListener('click', function() {
      var overlay = $('bookmarksOverlay');
      if (overlay) overlay.classList.remove('show');
    });

    var shortcutsClose = $('shortcutsClose');
    if (shortcutsClose) shortcutsClose.addEventListener('click', toggleShortcuts);

    /* ── Notes textarea ── */
    var notesArea = $('notesArea');
    if (notesArea) notesArea.addEventListener('input', function() {
      updateNotesCount();
      store.notes = notesArea.value;
      saveStore();
    });

    /* ── Search overlay ── */
    var searchOverlay = $('searchOverlay');
    if (searchOverlay) searchOverlay.addEventListener('click', function(e) {
      if (e.target === searchOverlay) closeSearch();
    });

    var searchInput = $('searchInput');
    if (searchInput) searchInput.addEventListener('input', function() {
      doSearch(searchInput.value);
    });

    var searchResults = $('searchResults');
    if (searchResults) searchResults.addEventListener('click', function(e) {
      var item = e.target.closest('.search-result-item');
      if (!item) return;
      var convoId = item.getAttribute('data-convoid');
      if (convoId && store.convos[convoId]) {
        activeId = convoId;
        curDomain = store.convos[convoId].domain || curDomain;
        saveStore();
        closeSearch();
        renderConvos();
        renderDomainChips();
        updateTopbar();
        renderChat();
      }
    });

    /* ── Achieve overlay close on backdrop ── */
    var achieveOverlay = $('achieveOverlay');
    if (achieveOverlay) achieveOverlay.addEventListener('click', function(e) {
      if (e.target === achieveOverlay) achieveOverlay.classList.remove('show');
    });

    /* ── Notes overlay close on backdrop ── */
    var notesOverlayEl = $('notesOverlay');
    if (notesOverlayEl) notesOverlayEl.addEventListener('click', function(e) {
      if (e.target === notesOverlayEl) closeNotes();
    });

    /* ── 북마크 overlay close on backdrop ── */
    var bookmarksOverlayEl = $('bookmarksOverlay');
    if (bookmarksOverlayEl) bookmarksOverlayEl.addEventListener('click', function(e) {
      if (e.target === bookmarksOverlayEl) bookmarksOverlayEl.classList.remove('show');
    });

    /* ── Shortcuts overlay close on backdrop ── */
    var shortcutsOverlayEl = $('shortcutsOverlay');
    if (shortcutsOverlayEl) shortcutsOverlayEl.addEventListener('click', function(e) {
      if (e.target === shortcutsOverlayEl) shortcutsOverlayEl.classList.remove('show');
    });

    /* ── 북마크 list (event delegation) ── */
    var bookmarksList = $('bookmarksList');
    if (bookmarksList) bookmarksList.addEventListener('click', function(e) {
      var item = e.target.closest('.bookmark-item');
      if (!item) return;
      var idx = parseInt(item.getAttribute('data-idx'), 10);
      /* Close bookmarks and scroll to that message */
      var overlay = $('bookmarksOverlay');
      if (overlay) overlay.classList.remove('show');
      var msgs = $('messagesInner');
      if (msgs) {
        var msgEls = msgs.querySelectorAll('.msg');
        if (msgEls[idx]) {
          msgEls[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
          msgEls[idx].style.outline = '2px solid var(--accent)';
          setTimeout(function() { msgEls[idx].style.outline = ''; }, 2000);
        }
      }
    });

    /* ── Mind map toolbar ── */
    var mmZoomInBtn = $('mmZoomIn');
    if (mmZoomInBtn) mmZoomInBtn.addEventListener('click', function() { mmZoom = clamp(mmZoom + 0.2, 0.3, 3); updateMmTransform(); });
    var mmZoomOutBtn = $('mmZoomOut');
    if (mmZoomOutBtn) mmZoomOutBtn.addEventListener('click', function() { mmZoom = clamp(mmZoom - 0.2, 0.3, 3); updateMmTransform(); });
    var mmResetBtn = $('mmReset');
    if (mmResetBtn) mmResetBtn.addEventListener('click', function() { mmZoom = 1; mmPanX = 0; mmPanY = 0; updateMmTransform(); });
    var mmExportBtn = $('mmExport');
    if (mmExportBtn) mmExportBtn.addEventListener('click', exportMindmapPng);

    initMindmapResize();
    initMindmapPanZoom();

    /* ══════════════════════════════════════════
       KEYBOARD SHORTCUTS (global)
       ══════════════════════════════════════════ */
    document.addEventListener('keydown', function(e) {
      var target = e.target;
      var isInput = target.tagName === 'INPUT' || target.tagName === 'TEXTAREA';

      /* Ctrl+N — New conversation */
      if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
        e.preventDefault(); newConvo(); showToast('새 대화가 시작되었습니다', 'success'); return;
      }

      /* Ctrl+K — Search */
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        var searchOl = $('searchOverlay');
        if (searchOl && searchOl.classList.contains('show')) closeSearch();
        else openSearch();
        return;
      }

      /* Ctrl+/ — Shortcuts */
      if ((e.ctrlKey || e.metaKey) && e.key === '/') {
        e.preventDefault();
        toggleShortcuts();
        return;
      }

      /* Alt+Z — 집중 모드 */
      if (e.altKey && e.key === 'z') {
        e.preventDefault();
        toggleFocus();
        return;
      }

      /* Alt+1 to Alt+6 — Domain switch */
      if (e.altKey && e.key >= '1' && e.key <= '6') {
        e.preventDefault();
        var keys = Object.keys(domains);
        var idx = parseInt(e.key, 10) - 1;
        if (idx < keys.length) {
          curDomain = keys[idx];
          saveStore();
          renderDomainChips();
          updateTopbar();
          renderChat();
          renderSuggestions();
          showToast(domains[curDomain].icon + ' ' + domains[curDomain].name + ' 전환됨', 'success');
        }
        return;
      }

      /* Ctrl+N — New conversation */
      if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
        e.preventDefault();
        cmdNew();
        return;
      }

      /* Ctrl+. — 빠른 메모 */
      if ((e.ctrlKey || e.metaKey) && e.key === '.') {
        e.preventDefault();
        var notesOl = $('notesOverlay');
        if (notesOl && notesOl.classList.contains('show')) closeNotes();
        else openNotes();
        return;
      }

      /* Escape — close overlays */
      if (e.key === 'Escape') {
        closeSearch();
        closeMindmap();
        closeNotes();
        var achOl = $('achieveOverlay');
        if (achOl) achOl.classList.remove('show');
        var bkOl = $('bookmarksOverlay');
        if (bkOl) bkOl.classList.remove('show');
        var scOl = $('shortcutsOverlay');
        if (scOl) scOl.classList.remove('show');
        var sb = $('sidebar');
        var sbBd = $('sidebarBackdrop');
        if (sb) sb.classList.remove('open');
        if (sbBd) sbBd.classList.remove('show');
        hideSlashMenu();
        return;
      }
    });

    /* Double-click bot message to copy */
    if (msgsEl) msgsEl.addEventListener('dblclick', function(e) {
      var bubble = e.target.closest('.msg-bubble');
      if (!bubble) return;
      var msg = bubble.closest('.msg');
      if (!msg || msg.classList.contains('user')) return;
      var text = bubble.textContent || '';
      navigator.clipboard.writeText(text).then(function() { showToast('📋 메시지 복사됨', 'success'); });
    });

    /* Message action delegation */
    var msgsEl = $('messages');
    if (msgsEl) msgsEl.addEventListener('click', function(e) {
      var btn = e.target.closest('.msg-action-btn');
      if (!btn) return;
      var action = btn.dataset.action, idx = parseInt(btn.dataset.idx);
      var convo = getActive(); if (!convo || !convo.msgs[idx]) return;
      var msg = convo.msgs[idx];
      if (action === 'copy') {
        navigator.clipboard.writeText((msg.text||'').replace(/<[^>]+>/g,'')).then(function(){ showToast('클립보드에 복사됨','success'); });
      } else if (action === 'bookmark') {
        addBookmark((msg.text||'').replace(/<[^>]+>/g,'').slice(0,40)+'…', convo.id || activeId, idx);
        btn.classList.toggle('bookmarked');
      } else if (action === 'read') {
        if(window.speechSynthesis){speechSynthesis.cancel();var u=new SpeechSynthesisUtterance((msg.text||'').replace(/<[^>]+>/g,''));u.lang='ko-KR';u.rate=.95;speechSynthesis.speak(u);showToast('🔊 읽기 시작','success')}
      } else if (action === 'react') {
        var picker = btn.parentElement.querySelector('.emoji-picker');
        if (!picker) {
          picker = document.createElement('div'); picker.className = 'emoji-picker';
          ['👍','❤️','😂','🤔','👏','🔥'].forEach(function(em){ var b=document.createElement('button');b.className='emoji-pick';b.textContent=em;b.addEventListener('click',function(ev){ev.stopPropagation();picker.classList.remove('show');var rw=btn.closest('.msg').querySelector('.msg-reactions');if(!rw){rw=document.createElement('div');rw.className='msg-reactions';btn.closest('.msg-bubble').parentElement.appendChild(rw)}var ex=rw.querySelector('[data-em="'+em+'"]');if(ex){ex.remove();if(!rw.children.length)rw.remove()}else{var badge=document.createElement('span');badge.className='msg-reaction';badge.dataset.em=em;badge.textContent=em;badge.addEventListener('click',function(){badge.remove();if(rw&&!rw.children.length)rw.remove()});rw.appendChild(badge)}});picker.appendChild(b)});
          btn.parentElement.style.position='relative';btn.parentElement.appendChild(picker);
        }
        picker.classList.toggle('show');
        document.addEventListener('click',function closeP(ev){if(!picker.contains(ev.target)&&ev.target!==btn){picker.classList.remove('show');document.removeEventListener('click',closeP)}},{once:false});
      }
    });

    /* Scroll progress bar */
    var msgEl = $('messages'), spEl = $('scrollProgress');
    if (msgEl && spEl) { msgEl.addEventListener('scroll', function() { var pct = msgEl.scrollHeight <= msgEl.clientHeight ? 100 : Math.round(msgEl.scrollTop / (msgEl.scrollHeight - msgEl.clientHeight) * 100); spEl.style.setProperty('--sp', pct + '%'); }); }

    /* Mobile sidebar toggle */
    var hbBtn=$('hamburgerBtn'),sbEl=$('sidebar'),sbBd=$('sidebarBackdrop');
    if(hbBtn&&sbEl){hbBtn.addEventListener('click',function(){sbEl.classList.toggle('open');if(sbBd)sbBd.classList.toggle('show')})}
    window.closeSidebar=function(){if(sbEl)sbEl.classList.remove('open');if(sbBd)sbBd.classList.remove('show')};

    /* Focus chat input on load (desktop) */
    if (window.innerWidth > 768) {
      var ci = $('chatInput');
      if (ci) ci.focus();
    }

    /* Proactive suggestion after 30s idle */
    var idleTimer=null;
    function resetIdle(){clearTimeout(idleTimer);var old=document.querySelector('.proactive-suggest');if(old)old.remove();
      idleTimer=setTimeout(function(){if(busy)return;var d=domains[curDomain];if(!d)return;var qs=Object.keys(d);var q=qs[Math.floor(Math.random()*qs.length)];
        var btn=document.createElement('button');btn.className='proactive-suggest';btn.textContent='💡 '+q.slice(0,30)+(q.length>30?'...':'')+'?';
        btn.onclick=function(){btn.remove();handle(q)};
        var ma=$('messages');if(ma)ma.appendChild(btn);
      },30000)}
    document.addEventListener('click',resetIdle);document.addEventListener('keydown',resetIdle);resetIdle();
  }

  /* Run init when DOM is ready */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
